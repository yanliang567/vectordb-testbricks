apiVersion: v1
kind: ServiceAccount
metadata:
  name: milvus-upgrade-rollback-runner
  namespace: qa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: milvus-upgrade-rollback-runner
  namespace: qa
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: milvus-upgrade-rollback-runner
  namespace: qa
subjects:
  - kind: ServiceAccount
    name: milvus-upgrade-rollback-runner
    namespace: qa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: milvus-upgrade-rollback-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: milvus-upgrade-rollback-manager
  namespace: qa-milvus
rules:
  - apiGroups: ["milvus.io"]
    resources: ["milvuses"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "statefulsets", "statefulsets/scale", "replicasets"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["", "extensions", "apps"]
    resources: ["pods", "services", "deployments", "secrets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "patch", "update", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: milvus-upgrade-rollback-manager
  namespace: qa-milvus
subjects:
  - kind: ServiceAccount
    name: milvus-upgrade-rollback-runner
    namespace: qa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: milvus-upgrade-rollback-manager
