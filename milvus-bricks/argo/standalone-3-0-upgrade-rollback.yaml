            kubectl -n "$ns" get pods,services,persistentvolumeclaims,deployments,statefulsets,replicasets -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/instance_resources.txt 2>&1 || true
            kubectl -n "$workflow_ns" get configmaps -l "$selector" -o wide > /tmp/milvus-bricks/k8s/workflow_configmaps.txt 2>&1 || true
            kubectl -n "$ns" get events --sort-by=.lastTimestamp > /tmp/milvus-bricks/k8s/events.txt 2>&1 || true
            cleanup_attempted=false
            cleanup_status="skipped"
            cleanup_error=""
            kept_resources="[]"
            if [ "{{workflow.parameters.keep-milvus}}" = "false" ]; then
              cleanup_attempted=true
              if {
                kubectl -n "$ns" delete milvuses -l "$selector" --ignore-not-found=true
                kubectl -n "$ns" delete services,persistentvolumeclaims,deployments,statefulsets,configmaps,secrets -l app.kubernetes.io/instance="{{workflow.name}}" --ignore-not-found=true
                kubectl -n "$workflow_ns" delete configmaps -l "$selector" --ignore-not-found=true
              } > /tmp/milvus-bricks/k8s/cleanup.txt 2>&1; then
                cleanup_status="completed"
              else
                cleanup_status="failed"
                cleanup_error="$(tr '\n' ' ' < /tmp/milvus-bricks/k8s/cleanup.txt | sed 's/"/\\"/g')"
              fi
            else
              kept_resources="[\"{{workflow.name}}\"]"
            fi
            if [ ! -f /tmp/milvus-bricks/reports/env_snapshot.json ]; then
              cat > /tmp/milvus-bricks/reports/env_snapshot.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "client_namespace": "{{workflow.parameters.client-namespace}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "client_image": "{{workflow.parameters.client-image}}",
              "repo_url": "{{workflow.parameters.repo-url}}",
              "repo_revision": "{{workflow.parameters.repo-revision}}",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "base_json_shredding_enabled": "{{workflow.parameters.base-json-shredding-enabled}}",
              "target_json_shredding_enabled": "{{workflow.parameters.target-json-shredding-enabled}}",
              "rollback_json_shredding_enabled": "{{workflow.parameters.rollback-json-shredding-enabled}}",
              "target_loon_ffi_enabled": "{{workflow.parameters.target-loon-ffi-enabled}}",
              "post_upgrade_config_toggle_enabled": "{{workflow.parameters.post-upgrade-config-toggle-enabled}}",
              "post_upgrade_json_shredding_enabled": "{{workflow.parameters.post-upgrade-json-shredding-enabled}}",
              "forward_workload_enabled": "{{workflow.parameters.forward-workload-enabled}}",
              "forward_schema_matrix": "{{workflow.parameters.forward-schema-matrix}}",
              "rollback_forward_validation_enabled": "{{workflow.parameters.rollback-forward-validation-enabled}}"
            }
            EOF
            fi
            python3 - <<PY
            import json
            from pathlib import Path

            path = Path("/tmp/milvus-bricks/reports/flow_summary.json")
            try:
                payload = json.loads(path.read_text())
            except Exception:
                payload = {
                    "workflow_name": "{{workflow.name}}",
                    "workflow_uid": "{{workflow.uid}}",
                    "milvus_release_name": "{{workflow.name}}",
                    "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
                    "milvus_host": "{{workflow.name}}-milvus.{{workflow.parameters.milvus-namespace}}.svc",
                    "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
                    "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
                }
            payload.update(
                {
                    "cleanup_attempted": json.loads("""$cleanup_attempted"""),
                    "cleanup_status": "$cleanup_status",
                    "cleanup_error": "$cleanup_error",
                    "kept_resources": json.loads("""$kept_resources"""),
                }
            )
            path.write_text(json.dumps(payload, indent=2, sort_keys=True))
            PY
            if [ ! -f /tmp/milvus-bricks/reports/orchestrator_report.json ]; then
              cat > /tmp/milvus-bricks/reports/orchestrator_report.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "milvus_release_name": "{{workflow.name}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "milvus_host": "{{workflow.name}}-milvus.{{workflow.parameters.milvus-namespace}}.svc",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "status": "{{workflow.status}}",
              "schema_matrix": "{{workflow.parameters.schema-matrix}}",
              "collection_prefix": "{{workflow.parameters.collection-prefix}}"
            }
            EOF
            fi
            if [ ! -f /tmp/milvus-bricks/reports/final_report.md ]; then
              {
                printf '%s\n' '# Milvus Standalone Upgrade/Rollback Report'
                printf '\n'
                printf '%s\n' '- workflow: `{{workflow.name}}`'
                printf '%s\n' '- status: `{{workflow.status}}`'
                printf '%s\n' '- collection prefix: `{{workflow.parameters.collection-prefix}}`'
              } > /tmp/milvus-bricks/reports/final_report.md
            fi
