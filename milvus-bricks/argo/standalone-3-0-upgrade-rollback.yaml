apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: milvus-standalone-3-0-upgrade-rollback
  namespace: qa
spec:
  serviceAccountName: milvus-upgrade-rollback-runner
  entrypoint: main
  onExit: maybe-cleanup
  arguments:
    parameters:
      - name: client-namespace
        value: qa
      - name: milvus-namespace
        value: qa-milvus
      - name: repo-url
        value: https://github.com/yanliang567/vectordb-testbricks.git
      - name: repo-revision
        value: main
      - name: client-image
        value: harbor.milvus.io/qa/fouram:2.1
      - name: python-deps
        value: pymilvus==3.0.0 pyyaml numpy
      - name: base-milvus-image
        value: harbor.milvus.io/milvusdb/milvus:3.0-20260701-d19d8484-47f6c14
      - name: base-version
        value: "3.0.0"
      - name: target-milvus-image
        value: harbor.milvus.io/milvusdb/milvus:master-20260707-5617a46a
      - name: target-version
        value: "3.0.0"
      - name: base-json-shredding-enabled
        value: "false"
      - name: target-json-shredding-enabled
        value: "false"
      - name: rollback-json-shredding-enabled
        value: "false"
      - name: target-loon-ffi-enabled
        value: "false"
      - name: post-upgrade-config-toggle-enabled
        value: "false"
      - name: post-upgrade-json-shredding-enabled
        value: "false"
      - name: forward-workload-enabled
        value: "false"
      - name: forward-schema-matrix
        value: milvus_client/manifests/schema_matrix_3_0.yaml
      - name: rollback-forward-validation-enabled
        value: "true"
      - name: standalone-cpu
        value: "4"
      - name: standalone-memory
        value: 16Gi
      - name: etcd-pvc-size
        value: 10Gi
      - name: storage-pvc-size
        value: 20Gi
      - name: collection-prefix
        value: qa_upgrade_30
      - name: schema-matrix
        value: milvus_client/manifests/schema_matrix_3_0.yaml
      - name: rows-per-collection
        value: "1000"
      - name: batch-size
        value: "100"
      - name: pressure-modules
        value: "search_pressure query_pressure query_iterator_scan count_pressure upsert_pressure delete_pressure mixed_rw_pressure"
      - name: pressure-slice-duration-sec
        value: "10"
      - name: pressure-max-workers
        value: "4"
      - name: pressure-batch-size
        value: "10"
      - name: pressure-interval-sec
        value: "1"
      - name: pressure-fail-on-error
        value: "true"
      - name: observe-after-upgrade-sec
        value: "60"
      - name: observe-after-rollback-sec
        value: "60"
      - name: keep-milvus
        value: "false"
  volumeClaimTemplates:
    - metadata:
        name: milvus-test-state
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
  templates:
    - name: main
      dag:
        tasks:
          - name: resolve-inputs
            template: resolve-inputs

          - name: deploy-base
            dependencies: [resolve-inputs]
            template: deploy-milvus

          - name: wait-base-ready
            dependencies: [deploy-base]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.base-milvus-image}}"

          - name: snapshot-base-config
            dependencies: [wait-base-ready]
            template: snapshot-milvus-config
            arguments:
              parameters:
                - name: phase
                  value: base

          - name: precheck-base
            dependencies: [snapshot-base-config]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_base
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: create-compat-schema
            dependencies: [precheck-base]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: create_compat_schema
                - name: module
                  value: milvus_client.requests.create_schema_matrix
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --drop-if-exists true
                    --load-after-create true

          - name: seed-compat-data
            dependencies: [create-compat-schema]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: seed_compat_data
                - name: module
                  value: milvus_client.requests.seed_data
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --rows-per-collection {{workflow.parameters.rows-per-collection}}
                    --batch-size {{workflow.parameters.batch-size}}

          - name: validate-before-upgrade
            dependencies: [seed-compat-data]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_before_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

          - name: pressure-daemon
            dependencies: [validate-before-upgrade]
            template: pressure-daemon

          - name: patch-upgrade
            dependencies: [pressure-daemon]
            template: patch-milvus-image
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.target-milvus-image}}"
                - name: version
                  value: "{{workflow.parameters.target-version}}"
                - name: image-update-mode
                  value: rollingUpgrade
                - name: json-shredding-enabled
                  value: "{{workflow.parameters.target-json-shredding-enabled}}"
                - name: loon-ffi-enabled
                  value: "{{workflow.parameters.target-loon-ffi-enabled}}"

          - name: wait-upgrade-ready
            dependencies: [patch-upgrade, pressure-daemon]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.target-milvus-image}}"

          - name: snapshot-after-upgrade-config
            dependencies: [wait-upgrade-ready, pressure-daemon]
            template: snapshot-milvus-config
            arguments:
              parameters:
                - name: phase
                  value: after-upgrade

          - name: observe-after-upgrade
            dependencies: [snapshot-after-upgrade-config, pressure-daemon]
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-after-upgrade-sec}}"
                - name: phase
                  value: after-upgrade

          - name: precheck-after-upgrade
            dependencies: [observe-after-upgrade, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_after_upgrade
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: validate-after-upgrade
            dependencies: [precheck-after-upgrade, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_after_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

          - name: patch-post-upgrade-config
            dependencies: [validate-after-upgrade, pressure-daemon]
            template: patch-milvus-config
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.post-upgrade-config-toggle-enabled}}"
                - name: json-shredding-enabled
                  value: "{{workflow.parameters.post-upgrade-json-shredding-enabled}}"
                - name: loon-ffi-enabled
                  value: "{{workflow.parameters.target-loon-ffi-enabled}}"

          - name: wait-post-upgrade-config-ready
            dependencies: [patch-post-upgrade-config, pressure-daemon]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.target-milvus-image}}"

          - name: snapshot-post-upgrade-config
            dependencies: [wait-post-upgrade-config-ready, pressure-daemon]
            template: snapshot-milvus-config
            arguments:
              parameters:
                - name: phase
                  value: post-upgrade-config

          - name: create-forward-schema
            dependencies: [snapshot-post-upgrade-config, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.forward-workload-enabled}}"
                - name: brick-name
                  value: create_forward_schema
                - name: module
                  value: milvus_client.requests.create_schema_matrix
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}
                    --drop-if-exists true
                    --load-after-create true

          - name: seed-forward-data
            dependencies: [create-forward-schema, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.forward-workload-enabled}}"
                - name: brick-name
                  value: seed_forward_data
                - name: module
                  value: milvus_client.requests.seed_data
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}
                    --rows-per-collection {{workflow.parameters.rows-per-collection}}
                    --batch-size {{workflow.parameters.batch-size}}

          - name: validate-forward-after-upgrade
            dependencies: [seed-forward-data, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.forward-workload-enabled}}"
                - name: brick-name
                  value: validate_forward_after_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}

          - name: patch-rollback
            dependencies: [validate-forward-after-upgrade, pressure-daemon]
            template: patch-milvus-image
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.base-milvus-image}}"
                - name: version
                  value: "{{workflow.parameters.base-version}}"
                - name: image-update-mode
                  value: rollingDowngrade
                - name: json-shredding-enabled
                  value: "{{workflow.parameters.rollback-json-shredding-enabled}}"
                - name: loon-ffi-enabled
                  value: "false"

          - name: wait-rollback-ready
            dependencies: [patch-rollback, pressure-daemon]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.base-milvus-image}}"

          - name: snapshot-after-rollback-config
            dependencies: [wait-rollback-ready, pressure-daemon]
            template: snapshot-milvus-config
            arguments:
              parameters:
                - name: phase
                  value: after-rollback

          - name: observe-after-rollback
            dependencies: [snapshot-after-rollback-config, pressure-daemon]
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-after-rollback-sec}}"
                - name: phase
                  value: after-rollback

          - name: precheck-after-rollback
            dependencies: [observe-after-rollback, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_after_rollback
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: validate-after-rollback
            dependencies: [precheck-after-rollback, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_after_rollback
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

          - name: validate-forward-after-rollback
            dependencies: [validate-after-rollback, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.rollback-forward-validation-enabled}}"
                - name: brick-name
                  value: validate_forward_after_rollback
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}

          - name: stop-pressure
            dependencies: [validate-forward-after-rollback, pressure-daemon]
            template: stop-pressure

          - name: check-pressure-results
            dependencies: [stop-pressure]
            template: check-pressure-results

          - name: collect-artifacts
            dependencies: [check-pressure-results]
            template: collect-artifacts

          - name: generate-final-report
            dependencies: [collect-artifacts]
            template: generate-final-report

          - name: gate-final-status
            dependencies: [generate-final-report]
            template: gate-final-status

    - name: resolve-inputs
      outputs:
        artifacts:
          - name: env-snapshot
            path: /tmp/milvus-bricks/reports/env_snapshot.json
          - name: flow-summary
            path: /tmp/milvus-bricks/reports/flow_summary.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            mkdir -p /tmp/milvus-bricks/reports
            cat > /tmp/milvus-bricks/reports/env_snapshot.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "client_namespace": "{{workflow.parameters.client-namespace}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "client_image": "{{workflow.parameters.client-image}}",
              "repo_url": "{{workflow.parameters.repo-url}}",
              "repo_revision": "{{workflow.parameters.repo-revision}}",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "base_version": "{{workflow.parameters.base-version}}",
              "target_version": "{{workflow.parameters.target-version}}",
              "base_json_shredding_enabled": "{{workflow.parameters.base-json-shredding-enabled}}",
              "target_json_shredding_enabled": "{{workflow.parameters.target-json-shredding-enabled}}",
              "rollback_json_shredding_enabled": "{{workflow.parameters.rollback-json-shredding-enabled}}",
              "target_loon_ffi_enabled": "{{workflow.parameters.target-loon-ffi-enabled}}",
              "post_upgrade_config_toggle_enabled": "{{workflow.parameters.post-upgrade-config-toggle-enabled}}",
              "post_upgrade_json_shredding_enabled": "{{workflow.parameters.post-upgrade-json-shredding-enabled}}",
              "forward_workload_enabled": "{{workflow.parameters.forward-workload-enabled}}",
              "forward_schema_matrix": "{{workflow.parameters.forward-schema-matrix}}",
              "rollback_forward_validation_enabled": "{{workflow.parameters.rollback-forward-validation-enabled}}",
              "collection_prefix": "{{workflow.parameters.collection-prefix}}",
              "schema_matrix": "{{workflow.parameters.schema-matrix}}",
              "standalone_cpu": "{{workflow.parameters.standalone-cpu}}",
              "standalone_memory": "{{workflow.parameters.standalone-memory}}",
              "etcd_pvc_size": "{{workflow.parameters.etcd-pvc-size}}",
              "storage_pvc_size": "{{workflow.parameters.storage-pvc-size}}",
              "rows_per_collection": "{{workflow.parameters.rows-per-collection}}",
              "batch_size": "{{workflow.parameters.batch-size}}",
              "pressure_modules": "{{workflow.parameters.pressure-modules}}",
              "pressure_fail_on_error": "{{workflow.parameters.pressure-fail-on-error}}",
              "keep_milvus": "{{workflow.parameters.keep-milvus}}"
            }
            EOF
            cat > /tmp/milvus-bricks/reports/flow_summary.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "milvus_release_name": "{{workflow.name}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "milvus_host": "{{workflow.name}}-milvus.{{workflow.parameters.milvus-namespace}}.svc",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "base_json_shredding_enabled": "{{workflow.parameters.base-json-shredding-enabled}}",
              "target_json_shredding_enabled": "{{workflow.parameters.target-json-shredding-enabled}}",
              "rollback_json_shredding_enabled": "{{workflow.parameters.rollback-json-shredding-enabled}}",
              "target_loon_ffi_enabled": "{{workflow.parameters.target-loon-ffi-enabled}}",
              "post_upgrade_config_toggle_enabled": "{{workflow.parameters.post-upgrade-config-toggle-enabled}}",
              "post_upgrade_json_shredding_enabled": "{{workflow.parameters.post-upgrade-json-shredding-enabled}}",
              "forward_workload_enabled": "{{workflow.parameters.forward-workload-enabled}}",
              "forward_schema_matrix": "{{workflow.parameters.forward-schema-matrix}}",
              "rollback_forward_validation_enabled": "{{workflow.parameters.rollback-forward-validation-enabled}}",
              "rows_per_collection": "{{workflow.parameters.rows-per-collection}}",
              "pressure_fail_on_error": "{{workflow.parameters.pressure-fail-on-error}}",
              "cleanup_attempted": false,
              "cleanup_status": "pending",
              "cleanup_error": "",
              "kept_resources": []
            }
            EOF

    - name: deploy-milvus
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eux
            cat <<EOF | kubectl apply -f -
            apiVersion: milvus.io/v1beta1
            kind: Milvus
            metadata:
              name: {{workflow.name}}
              namespace: {{workflow.parameters.milvus-namespace}}
              labels:
                app.kubernetes.io/managed-by: argo-workflow
                app.kubernetes.io/name: milvus-standalone-3-0-upgrade-rollback
                zilliz.com/workflow-run-id: "{{workflow.uid}}"
              annotations:
                zilliz.com/workflow-name: "{{workflow.name}}"
                zilliz.com/workflow-uid: "{{workflow.uid}}"
            spec:
              mode: standalone
              config:
                common:
                  storage:
                    jsonShreddingEnabled: {{workflow.parameters.base-json-shredding-enabled}}
              components:
                image: {{workflow.parameters.base-milvus-image}}
                version: "{{workflow.parameters.base-version}}"
                imagePullPolicy: IfNotPresent
                imageUpdateMode: all
                standalone:
                  resources:
                    requests:
                      cpu: "{{workflow.parameters.standalone-cpu}}"
                      memory: "{{workflow.parameters.standalone-memory}}"
                    limits:
                      cpu: "{{workflow.parameters.standalone-cpu}}"
                      memory: "{{workflow.parameters.standalone-memory}}"
              dependencies:
                msgStreamType: rocksmq
                etcd:
                  inCluster:
                    deletionPolicy: Delete
                    pvcDeletion: true
                    values:
                      replicaCount: 1
                      persistence:
                        size: "{{workflow.parameters.etcd-pvc-size}}"
                storage:
                  inCluster:
                    deletionPolicy: Delete
                    pvcDeletion: true
                    values:
                      mode: standalone
                      persistence:
                        size: "{{workflow.parameters.storage-pvc-size}}"
            EOF

    - name: wait-milvus-ready
      inputs:
        parameters:
          - name: expected-image
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            name="{{workflow.name}}"
            expected="{{inputs.parameters.expected-image}}"
            for i in $(seq 1 120); do
              status=$(kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o jsonpath='{.status.status}' 2>/dev/null || true)
              current=$(kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o jsonpath='{.status.currentImage}' 2>/dev/null || true)
              endpoint=$(kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o jsonpath='{.status.endpoint}' 2>/dev/null || true)
              echo "[$i] status=$status currentImage=$current endpoint=$endpoint expected=$expected"
              if kubectl -n {{workflow.parameters.milvus-namespace}} get svc "${name}-milvus" >/dev/null 2>&1; then
                svc_ok=true
              else
                svc_ok=false
              fi
              if { [ "$status" = "Healthy" ] || [ "$status" = "Ready" ]; } && [ "$svc_ok" = "true" ]; then
                if [ -z "$expected" ] || [ "$current" = "$expected" ]; then
                  kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o wide || true
                  kubectl -n {{workflow.parameters.milvus-namespace}} get pods -l app.kubernetes.io/instance="$name" -o wide || true
                  exit 0
                fi
              fi
              sleep 10
            done
            kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o yaml || true
            kubectl -n {{workflow.parameters.milvus-namespace}} get pods -l app.kubernetes.io/instance="$name" -o wide || true
            exit 1

    - name: patch-milvus-image
      inputs:
        parameters:
          - name: image
          - name: version
          - name: image-update-mode
          - name: json-shredding-enabled
          - name: loon-ffi-enabled
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eux
            cat >/tmp/milvus-patch.json <<EOF
            {
              "spec": {
                "components": {
                  "image": "{{inputs.parameters.image}}",
                  "version": "{{inputs.parameters.version}}",
                  "imageUpdateMode": "{{inputs.parameters.image-update-mode}}"
                },
                "config": {
                  "common": {
                    "storage": {
                      "jsonShreddingEnabled": {{inputs.parameters.json-shredding-enabled}},
                      "useLoonFFI": {{inputs.parameters.loon-ffi-enabled}}
                    }
                  }
                }
              }
            }
            EOF
            kubectl -n {{workflow.parameters.milvus-namespace}} patch mi {{workflow.name}} --type merge --patch-file /tmp/milvus-patch.json
            kubectl -n {{workflow.parameters.milvus-namespace}} get mi {{workflow.name}} -o yaml | sed -n '1,180p'

    - name: patch-milvus-config
      inputs:
        parameters:
          - name: enabled
          - name: json-shredding-enabled
          - name: loon-ffi-enabled
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eux
            if [ "{{inputs.parameters.enabled}}" != "true" ]; then
              echo "post-upgrade config toggle disabled"
              exit 0
            fi
            cat >/tmp/milvus-config-patch.json <<EOF
            {
              "spec": {
                "config": {
                  "common": {
                    "storage": {
                      "jsonShreddingEnabled": {{inputs.parameters.json-shredding-enabled}},
                      "useLoonFFI": {{inputs.parameters.loon-ffi-enabled}}
                    }
                  }
                }
              }
            }
            EOF
            kubectl -n {{workflow.parameters.milvus-namespace}} patch mi {{workflow.name}} --type merge --patch-file /tmp/milvus-config-patch.json
            kubectl -n {{workflow.parameters.milvus-namespace}} get mi {{workflow.name}} -o yaml | sed -n '1,180p'

    - name: snapshot-milvus-config
      inputs:
        parameters:
          - name: phase
      outputs:
        artifacts:
          - name: config-snapshot
            path: /tmp/milvus-bricks/k8s/config-{{inputs.parameters.phase}}.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        args:
          - |
            set -eu
            mkdir -p /tmp/milvus-bricks/k8s
            phase="{{inputs.parameters.phase}}"
            kubectl -n {{workflow.parameters.milvus-namespace}} get mi {{workflow.name}} -o json > "/tmp/milvus-bricks/k8s/milvus-${phase}.json"
            python3 - <<'PY'
            import json
            from pathlib import Path

            phase = "{{inputs.parameters.phase}}"
            source = Path(f"/tmp/milvus-bricks/k8s/milvus-{phase}.json")
            target = Path(f"/tmp/milvus-bricks/k8s/config-{phase}.json")
            payload = json.loads(source.read_text())
            spec = payload.get("spec", {})
            status = payload.get("status", {})
            snapshot = {
                "phase": phase,
                "name": payload.get("metadata", {}).get("name"),
                "namespace": payload.get("metadata", {}).get("namespace"),
                "image": spec.get("components", {}).get("image"),
                "version": spec.get("components", {}).get("version"),
                "image_update_mode": spec.get("components", {}).get("imageUpdateMode"),
                "current_image": status.get("currentImage"),
                "current_version": status.get("currentVersion"),
                "status": status.get("status"),
                "config": spec.get("config", {}),
            }
            target.write_text(json.dumps(snapshot, indent=2, sort_keys=True))
            print(json.dumps(snapshot, indent=2, sort_keys=True))
            PY
