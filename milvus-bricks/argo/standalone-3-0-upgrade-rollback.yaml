            sleep $(({{workflow.parameters.pressure-slice-duration-sec}} + 40))

    - name: check-pressure-results
      outputs:
        artifacts:
          - name: pressure-summary
            path: /tmp/milvus-bricks/pressure-summary.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            python3 - <<'PY'
            import json
            import subprocess
            from pathlib import Path

            root = Path("/tmp/milvus-bricks")
            result_dir = root / "pressure-results"
            attempts_path = root / "pressure-attempts.jsonl"
            result_dir.mkdir(parents=True, exist_ok=True)
            attempts_path.parent.mkdir(parents=True, exist_ok=True)
            selector = "zilliz.com/workflow-run-id={{workflow.uid}},zilliz.com/pressure-result=true"
            completed = subprocess.run(
                ["kubectl", "-n", "{{workflow.namespace}}", "get", "configmaps", "-l", selector, "-o", "json"],
                check=False,
                text=True,
                capture_output=True,
            )
            if completed.returncode != 0:
                raise SystemExit(completed.stderr or completed.stdout)
            payload = json.loads(completed.stdout or '{"items":[]}')
            result_dir = Path("/tmp/milvus-bricks/pressure-results")
            attempts_path = Path("/tmp/milvus-bricks/pressure-attempts.jsonl")
            attempts = []
            for item in payload.get("items", []):
                data = item.get("data", {})
                result_file = data.get("result_file") or f"{item['metadata']['name']}.json"
                attempts.append(
                    {
                        "module": data.get("module"),
                        "iteration": data.get("iteration"),
                        "result_file": result_file,
                        "return_code": data.get("return_code"),
                        "configmap": item["metadata"]["name"],
                    }
                )
                if "result.json" in data:
                    (result_dir / result_file).write_text(data["result.json"])
            attempts_path.write_text("\n".join(json.dumps(attempt, sort_keys=True) for attempt in attempts) + ("\n" if attempts else ""))
            files = sorted(result_dir.glob("*.json"))
            failed = []
            passed = 0
            attempt_files = [attempt["result_file"] for attempt in attempts if attempt.get("result_file")]
            if not files:
                failed.append(
                    {
                        "file": "pressure-results",
                        "status": "missing_result",
                        "failures": [
                            {
                                "type": "NO_PRESSURE_RESULTS",
                                "message": "pressure daemon did not produce any result json",
                            }
                        ],
                    }
                )
            for attempt in attempts:
                if attempt.get("return_code") == "pending":
                    failed.append(
                        {
                            "file": attempt.get("result_file"),
                            "brick": attempt.get("module"),
                            "status": "pending_result",
                            "configmap": attempt.get("configmap"),
                            "failures": [
                                {
                                    "type": "PRESSURE_ATTEMPT_PENDING",
                                    "message": "pressure attempt was recorded but did not complete",
                                }
                            ],
                        }
                    )
            for path in files:
                try:
                    payload = json.loads(path.read_text())
                except Exception as exc:
                    failed.append({"file": path.name, "status": "unreadable", "error": str(exc)})
                    continue
                if payload.get("status") == "passed":
                    passed += 1
                else:
                    failed.append(
                        {
                            "file": path.name,
                            "brick": payload.get("brick"),
                            "status": payload.get("status"),
                            "failures": payload.get("failures", []),
                            "metrics": payload.get("metrics", {}),
                        }
                    )
            existing_files = {path.name for path in files}
            for result_file in attempt_files:
                if result_file not in existing_files:
                    failed.append(
                        {
                            "file": result_file,
                            "status": "missing_result",
                            "failures": [
                                {
                                    "type": "PRESSURE_RESULT_MISSING",
                                    "message": "pressure attempt did not produce a result json",
                                }
                            ],
                        }
                    )
            summary = {
                "total": len(files),
                "attempts": len(attempt_files),
                "passed": passed,
                "failed": len(failed),
                "failed_results": failed,
                "fail_on_error": "{{workflow.parameters.pressure-fail-on-error}}" == "true",
            }
            Path("/tmp/milvus-bricks/pressure-summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True))
            print(json.dumps(summary, indent=2, sort_keys=True))
            PY
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

