    - name: deploy-milvus
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eux
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/milvus-bricks/reports
            PYTHONPATH=. python3 -m milvus_client.requests.render_milvus_helm_values \
              --deploy-profile "{{workflow.parameters.deploy-profile}}" \
              --name "{{workflow.name}}" \
              --namespace "{{workflow.parameters.milvus-namespace}}" \
              --image "{{workflow.parameters.base-milvus-image}}" \
              --version "{{workflow.parameters.base-version}}" \
              --json-shredding-enabled "{{workflow.parameters.base-json-shredding-enabled}}" \
              --loon-ffi-enabled "{{workflow.parameters.base-loon-ffi-enabled}}" \
              --vortex-enabled "{{workflow.parameters.base-vortex-enabled}}" \
              --workflow-name "{{workflow.name}}" \
              --workflow-uid "{{workflow.uid}}" \
              --app-name milvus-cluster-upgrade-rollback \
              --output-yaml /tmp/milvus-values.yaml \
              --summary-json /tmp/milvus-bricks/reports/deploy_topology.json
            PYTHONPATH=. python3 - <<'PY' >/tmp/helm-env
            from pathlib import Path
            import shlex
            import yaml

            profile = yaml.safe_load(Path("{{workflow.parameters.deploy-profile}}").read_text())
            helm = profile["helm"]
            for key in ["repo_name", "repo_url", "chart", "chart_version"]:
                print(f"{key}={shlex.quote(str(helm[key]))}")
            PY
            . /tmp/helm-env
            helm repo add "$repo_name" "$repo_url" || true
            helm repo update "$repo_name"
            helm upgrade --install "{{workflow.name}}" "$chart" \
              --version "$chart_version" \
              --namespace "{{workflow.parameters.milvus-namespace}}" \
              --values /tmp/milvus-values.yaml \
              --wait \
              --timeout 15m
            kubectl -n "{{workflow.parameters.milvus-namespace}}" get deploy,statefulset,pods,svc,pvc \
              -l app.kubernetes.io/instance="{{workflow.name}}" -o wide || true

    - name: wait-milvus-ready
      inputs:
        parameters:
          - name: expected-image
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eu
            name="{{workflow.name}}"
            ns="{{workflow.parameters.milvus-namespace}}"
            expected="{{inputs.parameters.expected-image}}"
            for i in $(seq 1 120); do
              helm_status=$(helm status "$name" -n "$ns" -o json 2>/dev/null | python3 -c 'import json,sys; print((json.load(sys.stdin).get("info") or {}).get("status", ""))' 2>/dev/null || true)
              if kubectl -n "$ns" get svc "$name" >/dev/null 2>&1; then
                svc_ok=true
              else
                svc_ok=false
              fi
              pods_ready=false
              if kubectl -n "$ns" wait pod -l app.kubernetes.io/instance="$name" --for=condition=Ready --timeout=10s >/tmp/pod-wait.log 2>&1; then
                pods_ready=true
              fi
              kubectl -n "$ns" get deploy,statefulset -l app.kubernetes.io/instance="$name" -o json >/tmp/workloads.json 2>/dev/null || echo '{"items":[]}' >/tmp/workloads.json
              image_status=$(python3 - "$expected" <<'PY'
            import json
            import sys

            expected = sys.argv[1]
            payload = json.load(open("/tmp/workloads.json"))
            milvus_images = []
            for item in payload.get("items", []):
                for container in item.get("spec", {}).get("template", {}).get("spec", {}).get("containers", []):
                    image = container.get("image", "")
                    if "milvusdb/milvus:" in image or "/milvus:" in image:
                        milvus_images.append(image)
            if not expected:
                print("ok" if milvus_images else "missing")
            else:
                print("ok" if milvus_images and all(image == expected for image in milvus_images) else ",".join(milvus_images))
            PY
              )
              echo "[$i] helmStatus=$helm_status svc=$svc_ok podsReady=$pods_ready milvusImages=$image_status expected=$expected"
              if [ "$helm_status" = "deployed" ] && [ "$svc_ok" = "true" ] && [ "$pods_ready" = "true" ]; then
                if [ "$image_status" = "ok" ]; then
                  helm status "$name" -n "$ns" || true
                  kubectl -n "$ns" get deploy,statefulset,pods,svc -l app.kubernetes.io/instance="$name" -o wide || true
                  exit 0
                fi
              fi
              sleep 10
            done
            helm status "$name" -n "$ns" || true
            kubectl -n "$ns" get deploy,statefulset,pods,svc,pvc -l app.kubernetes.io/instance="$name" -o wide || true
            kubectl -n "$ns" get events --sort-by=.lastTimestamp | tail -120 || true
            exit 1

