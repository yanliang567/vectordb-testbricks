    - name: run-brick
      inputs:
        parameters:
          - name: brick-name
          - name: module
          - name: collection-prefix
          - name: args
      outputs:
        artifacts:
          - name: result-json
            path: /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json
          - name: checkpoints
            path: /tmp/milvus-bricks/checkpoints
          - name: results
            path: /tmp/milvus-bricks/results
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eux
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/milvus-bricks/results /tmp/milvus-bricks/checkpoints
            PYTHONPATH=. python3 -m {{inputs.parameters.module}} \
              --uri "http://{{workflow.name}}.{{workflow.parameters.milvus-namespace}}.svc:19530" \
              --collection-prefix "{{inputs.parameters.collection-prefix}}" \
              --checkpoint-dir /tmp/milvus-bricks/checkpoints \
              --output-json /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json \
              {{inputs.parameters.args}}
            python3 -m json.tool /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: pressure-daemon
      daemon: true
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        readinessProbe:
          exec:
            command: [sh, -c, "test -f /tmp/pressure-ready"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eu
            trap 'echo "stopping pressure daemon"; exit 0' TERM INT
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/pressure-results /tmp/pressure-checkpoints
            stop_cm="{{workflow.name}}-pressure-stop"
            pressure_ns="{{workflow.namespace}}"
            iteration=0
            while ! kubectl -n "$pressure_ns" get configmap "$stop_cm" >/dev/null 2>&1; do
              for module in {{workflow.parameters.pressure-modules}}; do
                if kubectl -n "$pressure_ns" get configmap "$stop_cm" >/dev/null 2>&1; then
                  break
                fi
                iteration=$((iteration + 1))
                result="/tmp/pressure-results/${module}_${iteration}.json"
                result_file="$(basename "$result")"
                safe_module="$(echo "$module" | tr '_' '-')"
                attempt_cm="{{workflow.name}}-pressure-${iteration}-${safe_module}"
                kubectl -n "$pressure_ns" create configmap "$attempt_cm" \
                  --from-literal=module="$module" \
                  --from-literal=iteration="$iteration" \
                  --from-literal=result_file="$result_file" \
                  --from-literal=return_code="pending" \
                  --dry-run=client -o yaml > /tmp/pressure-attempt.yaml
                kubectl label --local -f /tmp/pressure-attempt.yaml \
                  app.kubernetes.io/managed-by=argo-workflow \
                  app.kubernetes.io/name=milvus-cluster-upgrade-rollback \
                  zilliz.com/workflow-run-id="{{workflow.uid}}" \
                  zilliz.com/pressure-result=true \
                  -o yaml | kubectl apply -f -
                set +e
                PYTHONPATH=. python3 -m "milvus_client.requests.${module}" \
                  --uri "http://{{workflow.name}}.{{workflow.parameters.milvus-namespace}}.svc:19530" \
                  --collection-prefix "{{workflow.parameters.collection-prefix}}" \
                  --checkpoint-dir /tmp/pressure-checkpoints \
                  --output-json "$result" \
                  --schema-matrix "{{workflow.parameters.schema-matrix}}" \
                  --duration-sec "{{workflow.parameters.pressure-slice-duration-sec}}" \
                  --max-workers "{{workflow.parameters.pressure-max-workers}}" \
                  --batch-size "{{workflow.parameters.pressure-batch-size}}" \
                  --baseline-start-id "0" \
                  --baseline-rows-per-collection "{{workflow.parameters.rows-per-collection}}"
                rc=$?
                set -e
                echo "pressure module=${module} iteration=${iteration} rc=${rc}"
                python3 -m json.tool "$result" || cat "$result" || true
                if [ "$rc" = "0" ] && [ ! -f /tmp/pressure-ready ]; then
                  touch /tmp/pressure-ready
                fi
                if [ "$rc" != "0" ]; then
                  if [ ! -f "$result" ]; then
                    cat > "$result" <<EOF
            {
              "brick": "$module",
              "status": "failed",
              "failures": [
                {
                  "type": "PRESSURE_PROCESS_FAILED",
                  "message": "pressure module exited without writing result json",
                  "return_code": $rc
                }
              ],
              "metrics": {
                "iteration": $iteration
              }
            }
            EOF
                  fi
                fi
                kubectl -n "$pressure_ns" create configmap "$attempt_cm" \
                  --from-literal=module="$module" \
                  --from-literal=iteration="$iteration" \
                  --from-literal=result_file="$result_file" \
                  --from-literal=return_code="$rc" \
                  --from-file=result.json="$result" \
                  --dry-run=client -o yaml > /tmp/pressure-result.yaml
                kubectl label --local -f /tmp/pressure-result.yaml \
                  app.kubernetes.io/managed-by=argo-workflow \
                  app.kubernetes.io/name=milvus-cluster-upgrade-rollback \
                  zilliz.com/workflow-run-id="{{workflow.uid}}" \
                  zilliz.com/pressure-result=true \
                  -o yaml | kubectl apply -f -
                sleep "{{workflow.parameters.pressure-interval-sec}}"
              done
            done

    - name: run-pressure-suite
      inputs:
        parameters:
          - name: phase
          - name: collection-prefix
          - name: schema-matrix
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eu
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/strict-pressure-results /tmp/strict-pressure-checkpoints
            phase="{{inputs.parameters.phase}}"
            failed=0
            for module in {{workflow.parameters.pressure-modules}}; do
              result="/tmp/strict-pressure-results/${phase}_${module}.json"
              echo "strict pressure phase=${phase} module=${module}"
              set +e
              PYTHONPATH=. python3 -m "milvus_client.requests.${module}" \
                --uri "http://{{workflow.name}}.{{workflow.parameters.milvus-namespace}}.svc:19530" \
                --collection-prefix "{{inputs.parameters.collection-prefix}}" \
                --checkpoint-dir /tmp/strict-pressure-checkpoints \
                --output-json "$result" \
                --schema-matrix "{{inputs.parameters.schema-matrix}}" \
                --duration-sec "{{workflow.parameters.pressure-slice-duration-sec}}" \
                --max-workers "{{workflow.parameters.pressure-max-workers}}" \
                --batch-size "{{workflow.parameters.pressure-batch-size}}" \
                --baseline-start-id "0" \
                --baseline-rows-per-collection "{{workflow.parameters.rows-per-collection}}"
              rc=$?
              set -e
              echo "strict pressure phase=${phase} module=${module} rc=${rc}"
              if [ -f "$result" ]; then
                python3 -m json.tool "$result" || cat "$result" || true
              else
                echo "strict pressure result file not found: $result"
                failed=1
              fi
              if [ "$rc" != "0" ]; then
                failed=1
              fi
            done
            exit "$failed"

    - name: stop-pressure
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        args:
          - |
            set -eu
            kubectl -n "{{workflow.namespace}}" create configmap "{{workflow.name}}-pressure-stop" \
              --from-literal=stop=true \
              --dry-run=client -o yaml > /tmp/pressure-stop.yaml
            kubectl label --local -f /tmp/pressure-stop.yaml \
              app.kubernetes.io/managed-by=argo-workflow \
              app.kubernetes.io/name=milvus-cluster-upgrade-rollback \
              zilliz.com/workflow-run-id="{{workflow.uid}}" \
              zilliz.com/pressure-stop=true \
              -o yaml | kubectl apply -f -
            sleep $(({{workflow.parameters.pressure-slice-duration-sec}} + 40))

    - name: check-pressure-results
      outputs:
        artifacts:
          - name: pressure-summary
            path: /tmp/milvus-bricks/pressure-summary.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eu
            python3 - <<'PY'
            import json
            import subprocess
            from pathlib import Path

            root = Path("/tmp/milvus-bricks")
            result_dir = root / "pressure-results"
            attempts_path = root / "pressure-attempts.jsonl"
            result_dir.mkdir(parents=True, exist_ok=True)
            attempts_path.parent.mkdir(parents=True, exist_ok=True)
            selector = "zilliz.com/workflow-run-id={{workflow.uid}},zilliz.com/pressure-result=true"
            completed = subprocess.run(
                ["kubectl", "-n", "{{workflow.namespace}}", "get", "configmaps", "-l", selector, "-o", "json"],
                check=False,
                text=True,
                capture_output=True,
            )
            if completed.returncode != 0:
                raise SystemExit(completed.stderr or completed.stdout)
            payload = json.loads(completed.stdout or '{"items":[]}')
            result_dir = Path("/tmp/milvus-bricks/pressure-results")
            attempts_path = Path("/tmp/milvus-bricks/pressure-attempts.jsonl")
            attempts = []
            for item in payload.get("items", []):
                data = item.get("data", {})
                result_file = data.get("result_file") or f"{item['metadata']['name']}.json"
                attempts.append(
                    {
                        "module": data.get("module"),
                        "iteration": data.get("iteration"),
                        "result_file": result_file,
                        "return_code": data.get("return_code"),
                        "configmap": item["metadata"]["name"],
                    }
                )
                if "result.json" in data:
                    (result_dir / result_file).write_text(data["result.json"])
            attempts_path.write_text("\n".join(json.dumps(attempt, sort_keys=True) for attempt in attempts) + ("\n" if attempts else ""))
            files = sorted(result_dir.glob("*.json"))
            failed = []
            passed = 0
            attempt_files = [attempt["result_file"] for attempt in attempts if attempt.get("result_file")]
            if not files:
                failed.append(
                    {
                        "file": "pressure-results",
                        "status": "missing_result",
                        "failures": [
                            {
                                "type": "NO_PRESSURE_RESULTS",
                                "message": "pressure daemon did not produce any result json",
                            }
                        ],
                    }
                )
            for attempt in attempts:
                if attempt.get("return_code") == "pending":
                    failed.append(
                        {
                            "file": attempt.get("result_file"),
                            "brick": attempt.get("module"),
                            "status": "pending_result",
                            "configmap": attempt.get("configmap"),
                            "failures": [
                                {
                                    "type": "PRESSURE_ATTEMPT_PENDING",
                                    "message": "pressure attempt was recorded but did not complete",
                                }
                            ],
                        }
                    )
            for path in files:
                try:
                    payload = json.loads(path.read_text())
                except Exception as exc:
                    failed.append({"file": path.name, "status": "unreadable", "error": str(exc)})
                    continue
                if payload.get("status") == "passed":
                    passed += 1
                else:
                    failed.append(
                        {
                            "file": path.name,
                            "brick": payload.get("brick"),
                            "status": payload.get("status"),
                            "failures": payload.get("failures", []),
                            "metrics": payload.get("metrics", {}),
                        }
                    )
            existing_files = {path.name for path in files}
            for result_file in attempt_files:
                if result_file not in existing_files:
                    failed.append(
                        {
                            "file": result_file,
                            "status": "missing_result",
                            "failures": [
                                {
                                    "type": "PRESSURE_RESULT_MISSING",
                                    "message": "pressure attempt did not produce a result json",
                                }
                            ],
                        }
                    )
            summary = {
                "total": len(files),
                "attempts": len(attempt_files),
                "passed": passed,
                "failed": len(failed),
                "failed_results": failed,
                "fail_on_error": "{{workflow.parameters.pressure-fail-on-error}}" == "true",
            }
            Path("/tmp/milvus-bricks/pressure-summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True))
            print(json.dumps(summary, indent=2, sort_keys=True))
            PY
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: collect-artifacts
      outputs:
        artifacts:
          - name: results
            path: /tmp/milvus-bricks/results
          - name: checkpoints
            path: /tmp/milvus-bricks/checkpoints
          - name: pressure-results
            path: /tmp/milvus-bricks/pressure-results
          - name: pressure-attempts
            path: /tmp/milvus-bricks/pressure-attempts.jsonl
          - name: pressure-summary
            path: /tmp/milvus-bricks/pressure-summary.json
          - name: k8s-snapshot
            path: /tmp/milvus-bricks/k8s
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eu
            mkdir -p /tmp/milvus-bricks/k8s
            ns="{{workflow.parameters.milvus-namespace}}"
            kubectl -n "$ns" get mi "{{workflow.name}}" -o yaml > /tmp/milvus-bricks/k8s/milvus.yaml 2>&1 || true
            kubectl -n "$ns" get pods -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/pods.txt 2>&1 || true
            kubectl -n "$ns" get services -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/services.txt 2>&1 || true
            kubectl -n "$ns" get persistentvolumeclaims -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/pvcs.txt 2>&1 || true
            kubectl -n "$ns" get deployments,statefulsets,replicasets -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/workloads.txt 2>&1 || true
            kubectl -n "$ns" get pods,services,persistentvolumeclaims,deployments,statefulsets,replicasets,jobs,configmaps,secrets,serviceaccounts,roles,rolebindings -l release="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/release_resources.txt 2>&1 || true
            kubectl -n "$ns" get events --sort-by=.lastTimestamp > /tmp/milvus-bricks/k8s/events.txt 2>&1 || true
            kubectl -n "{{workflow.namespace}}" get configmaps -l zilliz.com/workflow-run-id="{{workflow.uid}}" -o wide > /tmp/milvus-bricks/k8s/workflow_configmaps.txt 2>&1 || true
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: generate-final-report
      outputs:
        artifacts:
          - name: orchestrator-report
            path: /tmp/milvus-bricks/reports/orchestrator_report.json
          - name: final-report-md
            path: /tmp/milvus-bricks/reports/final_report.md
          - name: env-snapshot
            path: /tmp/milvus-bricks/reports/env_snapshot.json
          - name: flow-summary
            path: /tmp/milvus-bricks/reports/flow_summary.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eux
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/milvus-bricks/reports
            if [ ! -f /tmp/milvus-bricks/reports/env_snapshot.json ]; then
              cat > /tmp/milvus-bricks/reports/env_snapshot.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "client_namespace": "{{workflow.parameters.client-namespace}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "client_image": "{{workflow.parameters.client-image}}",
              "repo_url": "{{workflow.parameters.repo-url}}",
              "repo_revision": "{{workflow.parameters.repo-revision}}",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "rollback_milvus_image": "{{workflow.parameters.rollback-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "env_snapshot_fallback": true
            }
            EOF
            fi
            if [ ! -f /tmp/milvus-bricks/reports/flow_summary.json ]; then
              cat > /tmp/milvus-bricks/reports/flow_summary.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "milvus_release_name": "{{workflow.name}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "milvus_host": "{{workflow.name}}.{{workflow.parameters.milvus-namespace}}.svc",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "rollback_milvus_image": "{{workflow.parameters.rollback-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "flow_summary_fallback": true
            }
            EOF
            fi
            PYTHONPATH=. python3 -m milvus_client.requests.generate_workflow_report \
              --results-dir /tmp/milvus-bricks/results \
              --pressure-summary /tmp/milvus-bricks/pressure-summary.json \
              --k8s-dir /tmp/milvus-bricks/k8s \
              --env-snapshot /tmp/milvus-bricks/reports/env_snapshot.json \
              --flow-summary /tmp/milvus-bricks/reports/flow_summary.json \
              --output-json /tmp/milvus-bricks/reports/orchestrator_report.json \
              --output-md /tmp/milvus-bricks/reports/final_report.md \
              --workflow-name "{{workflow.name}}" \
              --workflow-uid "{{workflow.uid}}" \
              --workflow-namespace "{{workflow.namespace}}" \
              --milvus-release-name "{{workflow.name}}" \
              --milvus-namespace "{{workflow.parameters.milvus-namespace}}" \
              --milvus-host "{{workflow.name}}.{{workflow.parameters.milvus-namespace}}.svc" \
              --base-milvus-image "{{workflow.parameters.base-milvus-image}}" \
              --rollback-milvus-image "{{workflow.parameters.rollback-milvus-image}}" \
              --target-milvus-image "{{workflow.parameters.target-milvus-image}}" \
              --base-version "{{workflow.parameters.base-version}}" \
              --rollback-version "{{workflow.parameters.rollback-version}}" \
              --target-version "{{workflow.parameters.target-version}}" \
              --repo-url "{{workflow.parameters.repo-url}}" \
              --repo-revision "{{workflow.parameters.repo-revision}}" \
              --scenario-id "{{workflow.parameters.scenario-id}}" \
              --deploy-profile "{{workflow.parameters.deploy-profile}}" \
              --deploy-topology /tmp/milvus-bricks/reports/deploy_topology.json \
              --schema-matrix "{{workflow.parameters.schema-matrix}}" \
              --collection-prefix "{{workflow.parameters.collection-prefix}}" \
              --forward-collection-prefix "{{workflow.parameters.forward-collection-prefix}}" \
              --rows-per-collection "{{workflow.parameters.rows-per-collection}}" \
              --batch-size "{{workflow.parameters.batch-size}}" \
              --pressure-modules "{{workflow.parameters.pressure-modules}}" \
              --pressure-fail-on-error "{{workflow.parameters.pressure-fail-on-error}}" \
              --observe-before-upgrade-sec "{{workflow.parameters.observe-before-upgrade-sec}}" \
              --observe-after-upgrade-sec "{{workflow.parameters.observe-after-upgrade-sec}}" \
              --observe-before-rollback-sec "{{workflow.parameters.observe-before-rollback-sec}}" \
              --observe-after-rollback-sec "{{workflow.parameters.observe-after-rollback-sec}}" \
              --rollback-serviceability-timeout-sec "{{workflow.parameters.rollback-serviceability-timeout-sec}}" \
              --rollback-serviceability-interval-sec "{{workflow.parameters.rollback-serviceability-interval-sec}}" \
              --base-json-shredding-enabled "{{workflow.parameters.base-json-shredding-enabled}}" \
              --target-json-shredding-enabled "{{workflow.parameters.target-json-shredding-enabled}}" \
              --rollback-json-shredding-enabled "{{workflow.parameters.rollback-json-shredding-enabled}}" \
              --base-loon-ffi-enabled "{{workflow.parameters.base-loon-ffi-enabled}}" \
              --target-loon-ffi-enabled "{{workflow.parameters.target-loon-ffi-enabled}}" \
              --rollback-loon-ffi-enabled "{{workflow.parameters.rollback-loon-ffi-enabled}}" \
              --base-vortex-enabled "{{workflow.parameters.base-vortex-enabled}}" \
              --target-vortex-enabled "{{workflow.parameters.target-vortex-enabled}}" \
              --rollback-vortex-enabled "{{workflow.parameters.rollback-vortex-enabled}}" \
              --post-upgrade-config-toggle-enabled "{{workflow.parameters.post-upgrade-config-toggle-enabled}}" \
              --post-upgrade-json-shredding-enabled "{{workflow.parameters.post-upgrade-json-shredding-enabled}}" \
              --forward-workload-enabled "{{workflow.parameters.forward-workload-enabled}}" \
              --forward-schema-matrix "{{workflow.parameters.forward-schema-matrix}}" \
              --rollback-enabled "{{workflow.parameters.rollback-enabled}}" \
              --rollback-forward-validation-enabled "{{workflow.parameters.rollback-forward-validation-enabled}}" \
              --schema-evolution-existing-enabled "{{workflow.parameters.schema-evolution-existing-enabled}}" \
              --schema-evolution-forward-enabled "{{workflow.parameters.schema-evolution-forward-enabled}}" \
              --soft-fail
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: gate-final-status
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eu
            python3 - <<'PY'
            import json
            from pathlib import Path

            report_path = Path("/tmp/milvus-bricks/reports/orchestrator_report.json")
            if not report_path.exists():
                raise SystemExit("missing orchestrator_report.json")
            report = json.loads(report_path.read_text())
            status = report.get("status")
            allow_warning = "{{workflow.parameters.gate-allow-warning}}" == "true"
            print(json.dumps({"status": status, "allow_warning": allow_warning}, indent=2, sort_keys=True))
            if status != "passed" and not (allow_warning and status == "warning"):
                raise SystemExit(1)
            PY
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: observe
      inputs:
        parameters:
          - name: seconds
          - name: phase
      container:
        image: alpine:3.20
        command: [sh, -c]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        args:
          - |
            echo "Observing {{inputs.parameters.phase}} for {{inputs.parameters.seconds}} seconds"
            sleep "{{inputs.parameters.seconds}}"

    - name: maybe-cleanup
      outputs:
        artifacts:
          - name: orchestrator-report
            path: /tmp/milvus-bricks/reports/orchestrator_report.json
          - name: final-report-md
            path: /tmp/milvus-bricks/reports/final_report.md
          - name: flow-summary
            path: /tmp/milvus-bricks/reports/flow_summary.json
          - name: env-snapshot
            path: /tmp/milvus-bricks/reports/env_snapshot.json
          - name: k8s-snapshot
            path: /tmp/milvus-bricks/k8s
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eu
            mkdir -p /tmp/milvus-bricks/reports /tmp/milvus-bricks/k8s
            ns="{{workflow.parameters.milvus-namespace}}"
            selector="zilliz.com/workflow-run-id={{workflow.uid}}"
            workflow_ns="{{workflow.namespace}}"
            kubectl -n "$ns" get milvuses -l "$selector" -o wide > /tmp/milvus-bricks/k8s/owned_milvuses.txt 2>&1 || true
            kubectl -n "$ns" get pods,services,persistentvolumeclaims,deployments,statefulsets,replicasets -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/instance_resources.txt 2>&1 || true
            kubectl -n "$ns" get pods,services,persistentvolumeclaims,deployments,statefulsets,replicasets,jobs,configmaps,secrets,serviceaccounts,roles,rolebindings -l release="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/release_resources.txt 2>&1 || true
            kubectl -n "$workflow_ns" get configmaps -l "$selector" -o wide > /tmp/milvus-bricks/k8s/workflow_configmaps.txt 2>&1 || true
            kubectl -n "$ns" get events --sort-by=.lastTimestamp > /tmp/milvus-bricks/k8s/events.txt 2>&1 || true
            cleanup_attempted=false
            cleanup_status="skipped"
            cleanup_error=""
            kept_resources="[]"
            if [ "{{workflow.parameters.keep-milvus}}" = "false" ]; then
              cleanup_attempted=true
              if {
                cleanup_failed=false
                if ! helm uninstall "{{workflow.name}}" -n "$ns" --wait --timeout 5m; then
                  cleanup_failed=true
                  echo "helm uninstall failed for release {{workflow.name}}"
                fi
                if ! kubectl -n "$ns" get pvc -o json > /tmp/milvus-bricks/k8s/pvcs-before-explicit-cleanup.json; then
                  cleanup_failed=true
                  echo "failed to list PVCs before explicit cleanup"
                  echo '{"items":[]}' > /tmp/milvus-bricks/k8s/pvcs-before-explicit-cleanup.json
                fi
                python3 - "{{workflow.name}}" <<'PY' > /tmp/milvus-bricks/k8s/explicit-pvcs-to-delete.txt
            import json
            import re
            import sys
            from pathlib import Path

            release = sys.argv[1]
            payload = json.loads(Path("/tmp/milvus-bricks/k8s/pvcs-before-explicit-cleanup.json").read_text())
            pattern = re.compile(
                rf"^(data-{re.escape(release)}-etcd-[0-9]+|woodpecker-storage-{re.escape(release)}-woodpecker-[0-9]+)$"
            )
            for item in payload.get("items", []):
                name = item.get("metadata", {}).get("name", "")
                if pattern.match(name):
                    print(f"persistentvolumeclaim/{name}")
            PY
                while IFS= read -r pvc_resource; do
                  [ -n "$pvc_resource" ] || continue
                  kubectl -n "$ns" delete "$pvc_resource" --ignore-not-found=true || cleanup_failed=true
                done < /tmp/milvus-bricks/k8s/explicit-pvcs-to-delete.txt
                kubectl -n "$ns" delete milvuses -l "$selector" --ignore-not-found=true || cleanup_failed=true
                kubectl -n "$ns" delete services,persistentvolumeclaims,deployments,statefulsets,configmaps,secrets,serviceaccounts,poddisruptionbudgets,jobs,roles,rolebindings -l app.kubernetes.io/instance="{{workflow.name}}" --ignore-not-found=true || cleanup_failed=true
                kubectl -n "$ns" delete services,persistentvolumeclaims,deployments,statefulsets,configmaps,secrets,serviceaccounts,poddisruptionbudgets,jobs,roles,rolebindings -l release="{{workflow.name}}" --ignore-not-found=true || cleanup_failed=true
                kubectl -n "$workflow_ns" delete configmaps -l "$selector" --ignore-not-found=true || cleanup_failed=true
                if helm status "{{workflow.name}}" -n "$ns" >/dev/null 2>&1; then
                  cleanup_failed=true
                  echo "helm release still exists after cleanup: {{workflow.name}}"
                fi
                if ! kubectl -n "$ns" get pvc -o json > /tmp/milvus-bricks/k8s/pvcs-after-cleanup.json; then
                  cleanup_failed=true
                  echo "failed to list PVCs after cleanup"
                  echo '{"items":[]}' > /tmp/milvus-bricks/k8s/pvcs-after-cleanup.json
                fi
                python3 - "{{workflow.name}}" <<'PY' > /tmp/milvus-bricks/k8s/remaining-pvcs-after-cleanup.txt
            import json
            import re
            import sys
            from pathlib import Path

            release = sys.argv[1]
            payload = json.loads(Path("/tmp/milvus-bricks/k8s/pvcs-after-cleanup.json").read_text())
            release_owned_names = re.compile(
                rf"^(data-{re.escape(release)}-etcd-[0-9]+|woodpecker-storage-{re.escape(release)}-woodpecker-[0-9]+)$"
            )
            for item in payload.get("items", []):
                metadata = item.get("metadata", {})
                name = metadata.get("name", "")
                labels = metadata.get("labels", {})
                if (
                    release_owned_names.match(name)
                    or labels.get("release") == release
                    or labels.get("app.kubernetes.io/instance") == release
                ):
                    print(name)
            PY
                if [ -s /tmp/milvus-bricks/k8s/remaining-pvcs-after-cleanup.txt ]; then
                  cleanup_failed=true
                  echo "PVCs still exist after cleanup:"
                  cat /tmp/milvus-bricks/k8s/remaining-pvcs-after-cleanup.txt
                fi
                [ "$cleanup_failed" = "false" ]
              } > /tmp/milvus-bricks/k8s/cleanup.txt 2>&1; then
                cleanup_status="completed"
              else
                cleanup_status="failed"
                cleanup_error="$(tr '\n' ' ' < /tmp/milvus-bricks/k8s/cleanup.txt | sed 's/"/\\"/g')"
              fi
            else
              kept_resources="[\"{{workflow.name}}\"]"
            fi
            if [ ! -f /tmp/milvus-bricks/reports/env_snapshot.json ]; then
              cat > /tmp/milvus-bricks/reports/env_snapshot.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "client_namespace": "{{workflow.parameters.client-namespace}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "client_image": "{{workflow.parameters.client-image}}",
              "repo_url": "{{workflow.parameters.repo-url}}",
              "repo_revision": "{{workflow.parameters.repo-revision}}",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "rollback_milvus_image": "{{workflow.parameters.rollback-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "base_json_shredding_enabled": "{{workflow.parameters.base-json-shredding-enabled}}",
              "target_json_shredding_enabled": "{{workflow.parameters.target-json-shredding-enabled}}",
              "rollback_json_shredding_enabled": "{{workflow.parameters.rollback-json-shredding-enabled}}",
              "base_loon_ffi_enabled": "{{workflow.parameters.base-loon-ffi-enabled}}",
              "target_loon_ffi_enabled": "{{workflow.parameters.target-loon-ffi-enabled}}",
              "rollback_loon_ffi_enabled": "{{workflow.parameters.rollback-loon-ffi-enabled}}",
              "base_vortex_enabled": "{{workflow.parameters.base-vortex-enabled}}",
              "target_vortex_enabled": "{{workflow.parameters.target-vortex-enabled}}",
              "rollback_vortex_enabled": "{{workflow.parameters.rollback-vortex-enabled}}",
              "post_upgrade_config_toggle_enabled": "{{workflow.parameters.post-upgrade-config-toggle-enabled}}",
              "post_upgrade_json_shredding_enabled": "{{workflow.parameters.post-upgrade-json-shredding-enabled}}",
              "forward_workload_enabled": "{{workflow.parameters.forward-workload-enabled}}",
              "forward_schema_matrix": "{{workflow.parameters.forward-schema-matrix}}",
              "rollback_enabled": "{{workflow.parameters.rollback-enabled}}",
              "collection_prefix": "{{workflow.parameters.collection-prefix}}",
              "forward_collection_prefix": "{{workflow.parameters.forward-collection-prefix}}",
              "rollback_forward_validation_enabled": "{{workflow.parameters.rollback-forward-validation-enabled}}",
              "schema_evolution_existing_enabled": "{{workflow.parameters.schema-evolution-existing-enabled}}",
              "schema_evolution_forward_enabled": "{{workflow.parameters.schema-evolution-forward-enabled}}"
            }
            EOF
            fi
            python3 - <<PY
            import json
            from pathlib import Path

            path = Path("/tmp/milvus-bricks/reports/flow_summary.json")
            try:
                payload = json.loads(path.read_text())
            except Exception:
                payload = {
                    "workflow_name": "{{workflow.name}}",
                    "workflow_uid": "{{workflow.uid}}",
                    "milvus_release_name": "{{workflow.name}}",
                    "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
                    "milvus_host": "{{workflow.name}}.{{workflow.parameters.milvus-namespace}}.svc",
                    "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
                    "rollback_milvus_image": "{{workflow.parameters.rollback-milvus-image}}",
                    "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
                    "collection_prefix": "{{workflow.parameters.collection-prefix}}",
                    "forward_collection_prefix": "{{workflow.parameters.forward-collection-prefix}}",
                }
            payload.update(
                {
                    "cleanup_attempted": json.loads("""$cleanup_attempted"""),
                    "cleanup_status": "$cleanup_status",
                    "cleanup_error": "$cleanup_error",
                    "kept_resources": json.loads("""$kept_resources"""),
                }
            )
            path.write_text(json.dumps(payload, indent=2, sort_keys=True))
            PY
            if [ ! -f /tmp/milvus-bricks/reports/orchestrator_report.json ]; then
              cat > /tmp/milvus-bricks/reports/orchestrator_report.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "milvus_release_name": "{{workflow.name}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "milvus_host": "{{workflow.name}}.{{workflow.parameters.milvus-namespace}}.svc",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "rollback_milvus_image": "{{workflow.parameters.rollback-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "status": "{{workflow.status}}",
              "schema_matrix": "{{workflow.parameters.schema-matrix}}",
              "collection_prefix": "{{workflow.parameters.collection-prefix}}",
              "forward_collection_prefix": "{{workflow.parameters.forward-collection-prefix}}"
            }
            EOF
            fi
            if [ ! -f /tmp/milvus-bricks/reports/final_report.md ]; then
              {
                printf '%s\n' '# Milvus Standalone Upgrade/Rollback Report'
                printf '\n'
                printf '%s\n' '- workflow: `{{workflow.name}}`'
                printf '%s\n' '- status: `{{workflow.status}}`'
                printf '%s\n' '- collection prefix: `{{workflow.parameters.collection-prefix}}`'
                printf '%s\n' '- forward collection prefix: `{{workflow.parameters.forward-collection-prefix}}`'
              } > /tmp/milvus-bricks/reports/final_report.md
            fi
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks
