            helm upgrade "{{workflow.name}}" "$chart" \
              --version "$chart_version" \
              --namespace "{{workflow.parameters.milvus-namespace}}" \
              --reuse-values \
              --set image.all.repository="$repository" \
              --set image.all.tag="$tag" \
              --set image.all.pullPolicy=Always \
              --set-file extraConfigFiles.user\\.yaml=/tmp/user.yaml \
              --wait \
