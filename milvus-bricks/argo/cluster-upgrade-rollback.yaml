    - name: snapshot-milvus-config
      inputs:
        parameters:
          - name: phase
      outputs:
        artifacts:
          - name: config-snapshot
            path: /tmp/milvus-bricks/k8s/config-{{inputs.parameters.phase}}.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        args:
          - |
            set -eu
            python3 -m pip install --disable-pip-version-check -q pyyaml
            mkdir -p /tmp/milvus-bricks/k8s
            phase="{{inputs.parameters.phase}}"
            version="{{workflow.parameters.target-version}}"
            case "$phase" in
              base) version="{{workflow.parameters.base-version}}" ;;
              after-rollback) version="{{workflow.parameters.rollback-version}}" ;;
            esac
            export SNAPSHOT_PHASE="$phase"
            export SNAPSHOT_VERSION="$version"
            helm get values "{{workflow.name}}" -n "{{workflow.parameters.milvus-namespace}}" -a -o yaml > "/tmp/milvus-bricks/k8s/helm-values-${phase}.yaml"
            kubectl -n {{workflow.parameters.milvus-namespace}} get deploy,statefulset \
              -l app.kubernetes.io/instance="{{workflow.name}}" -o json > "/tmp/milvus-bricks/k8s/workloads-${phase}.json"
            python3 - <<'PY'
            import json
            import os
            from pathlib import Path
            import yaml

            phase = os.environ["SNAPSHOT_PHASE"]
            version = os.environ["SNAPSHOT_VERSION"]
            values_source = Path(f"/tmp/milvus-bricks/k8s/helm-values-{phase}.yaml")
            workloads_source = Path(f"/tmp/milvus-bricks/k8s/workloads-{phase}.json")
            target = Path(f"/tmp/milvus-bricks/k8s/config-{phase}.json")
            values = yaml.safe_load(values_source.read_text()) or {}
            workloads = json.loads(workloads_source.read_text())
            image_all = values.get("image", {}).get("all", {})
            image = f"{image_all.get('repository')}:{image_all.get('tag')}"
            milvus_images = []
            for item in workloads.get("items", []):
                for container in item.get("spec", {}).get("template", {}).get("spec", {}).get("containers", []):
                    container_image = container.get("image", "")
                    if "milvusdb/milvus:" in container_image or "/milvus:" in container_image:
                        milvus_images.append(container_image)
            snapshot = {
                "phase": phase,
                "name": "{{workflow.name}}",
                "namespace": "{{workflow.parameters.milvus-namespace}}",
                "image": image,
                "version": version,
                "image_update_mode": "helm-upgrade",
                "current_image": image,
                "current_version": version,
                "status": "deployed",
                "milvus_images": milvus_images,
                "config": yaml.safe_load(values.get("extraConfigFiles", {}).get("user.yaml", "{}")) or {},
            }
            target.write_text(json.dumps(snapshot, indent=2, sort_keys=True))
            print(json.dumps(snapshot, indent=2, sort_keys=True))
            PY
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

