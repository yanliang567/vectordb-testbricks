apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: milvus-cluster-upgrade-rollback
  namespace: qa
spec:
  serviceAccountName: milvus-upgrade-rollback-runner
  entrypoint: main
  onExit: maybe-cleanup
  arguments:
    parameters:
      - name: client-namespace
        value: qa
      - name: milvus-namespace
        value: qa-milvus
      - name: repo-url
        value: https://github.com/yanliang567/vectordb-testbricks.git
      - name: repo-revision
        value: main
      - name: scenario-id
        value: cluster-3-0-baseline-to-3-0-latest-rollback-3-0-baseline
      - name: deploy-profile
        value: milvus_client/manifests/deploy_profiles/cluster-woodpecker-1cu.yaml
      - name: client-image
        value: harbor.milvus.io/qa/fouram:2.1
      - name: python-deps
        value: pymilvus==3.0.0 pyyaml numpy
      - name: base-milvus-image
        value: harbor.milvus.io/milvusdb/milvus:3.0-20260701-d19d8484-47f6c14
      - name: rollback-milvus-image
        value: harbor.milvus.io/milvusdb/milvus:3.0-20260701-d19d8484-47f6c14
      - name: rollback-version
        value: "3.0.0"
      - name: base-version
        value: "3.0.0"
      - name: target-milvus-image
        value: harbor.milvus.io/milvusdb/milvus:master-20260707-5617a46a
      - name: target-version
        value: "3.0.0"
      - name: base-json-shredding-enabled
        value: "false"
      - name: target-json-shredding-enabled
        value: "false"
      - name: rollback-json-shredding-enabled
        value: "false"
      - name: base-loon-ffi-enabled
        value: "false"
      - name: target-loon-ffi-enabled
        value: "false"
      - name: rollback-loon-ffi-enabled
        value: "false"
      - name: base-vortex-enabled
        value: "false"
      - name: target-vortex-enabled
        value: "false"
      - name: rollback-vortex-enabled
        value: "false"
      - name: post-upgrade-config-toggle-enabled
        value: "false"
      - name: post-upgrade-json-shredding-enabled
        value: "false"
      - name: forward-workload-enabled
        value: "false"
      - name: forward-schema-matrix
        value: milvus_client/manifests/schema_matrix_3_0.yaml
      - name: rollback-enabled
        value: "true"
      - name: rollback-forward-validation-enabled
        value: "true"
      - name: schema-evolution-existing-enabled
        value: "true"
      - name: schema-evolution-forward-enabled
        value: "false"
      - name: standalone-cpu-request
        value: "2"
      - name: standalone-memory-request
        value: 4Gi
      - name: standalone-cpu
        value: "4"
      - name: standalone-memory
        value: 8Gi
      - name: etcd-pvc-size
        value: 10Gi
      - name: storage-pvc-size
        value: 20Gi
      - name: collection-prefix
        value: qa_gate_cluster_30_to_30latest
      - name: forward-collection-prefix
        value: qa_gate_cluster_30_to_30latest_forward
      - name: schema-matrix
        value: milvus_client/manifests/schema_matrix_3_0.yaml
      - name: rows-per-collection
        value: "5000"
      - name: batch-size
        value: "100"
      - name: pressure-modules
        value: "search_pressure query_pressure query_iterator_scan count_pressure upsert_pressure delete_pressure mixed_rw_pressure"
      - name: pressure-slice-duration-sec
        value: "10"
      - name: pressure-max-workers
        value: "4"
      - name: pressure-batch-size
        value: "10"
      - name: pressure-interval-sec
        value: "1"
      - name: pressure-fail-on-error
        value: "true"
      - name: gate-allow-warning
        value: "false"
      - name: allow-unsafe-negative-coverage
        value: "false"
      - name: observe-before-upgrade-sec
        value: "300"
      - name: observe-after-upgrade-sec
        value: "300"
      - name: observe-before-rollback-sec
        value: "300"
      - name: observe-after-rollback-sec
        value: "300"
      - name: rollback-serviceability-timeout-sec
        value: "900"
      - name: rollback-serviceability-interval-sec
        value: "10"
      - name: keep-milvus
        value: "false"
  volumeClaimTemplates:
    - metadata:
        name: milvus-test-state
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
  templates:
    - name: main
      dag:
        tasks:
          - name: resolve-inputs
            template: resolve-inputs

          - name: deploy-base
            dependencies: [resolve-inputs]
            template: deploy-milvus

          - name: wait-base-ready
            dependencies: [deploy-base]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.base-milvus-image}}"

          - name: snapshot-base-config
            dependencies: [wait-base-ready]
            template: snapshot-milvus-config
            arguments:
              parameters:
                - name: phase
                  value: base

          - name: precheck-base
            dependencies: [snapshot-base-config]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_base
                - name: module
                  value: milvus_client.requests.precheck
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: ""

          - name: create-compat-schema
            dependencies: [precheck-base]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: create_compat_schema
                - name: module
                  value: milvus_client.requests.create_schema_matrix
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --drop-if-exists true
                    --load-after-create true

          - name: seed-compat-data
            dependencies: [create-compat-schema]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: seed_compat_data
                - name: module
                  value: milvus_client.requests.seed_data
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/baseline/seed_data.json
                    --rows-per-collection {{workflow.parameters.rows-per-collection}}
                    --batch-size {{workflow.parameters.batch-size}}

          - name: validate-before-upgrade
            dependencies: [seed-compat-data]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_before_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/baseline/seed_data.json

          - name: strict-pressure-before-upgrade
            dependencies: [validate-before-upgrade]
            template: run-pressure-suite
            arguments:
              parameters:
                - name: phase
                  value: before-upgrade
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: schema-matrix
                  value: "{{workflow.parameters.schema-matrix}}"

          - name: pressure-daemon
            dependencies: [strict-pressure-before-upgrade]
            template: pressure-daemon

          - name: observe-before-upgrade
            dependencies: [pressure-daemon]
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-before-upgrade-sec}}"
                - name: phase
                  value: before-upgrade

          - name: patch-upgrade
            dependencies: [observe-before-upgrade, pressure-daemon]
            template: patch-milvus-image
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.target-milvus-image}}"
                - name: version
                  value: "{{workflow.parameters.target-version}}"
                - name: image-update-mode
                  value: rollingUpgrade
                - name: json-shredding-enabled
                  value: "{{workflow.parameters.target-json-shredding-enabled}}"
                - name: loon-ffi-enabled
                  value: "{{workflow.parameters.target-loon-ffi-enabled}}"
                - name: vortex-enabled
                  value: "{{workflow.parameters.target-vortex-enabled}}"

          - name: wait-upgrade-ready
            dependencies: [patch-upgrade, pressure-daemon]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.target-milvus-image}}"

          - name: snapshot-after-upgrade-config
            dependencies: [wait-upgrade-ready, pressure-daemon]
            template: snapshot-milvus-config
            arguments:
              parameters:
                - name: phase
                  value: after-upgrade

          - name: observe-after-upgrade
            dependencies: [snapshot-after-upgrade-config, pressure-daemon]
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-after-upgrade-sec}}"
                - name: phase
                  value: after-upgrade

          - name: precheck-after-upgrade
            dependencies: [observe-after-upgrade, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_after_upgrade
                - name: module
                  value: milvus_client.requests.precheck
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: ""

          - name: wait-upgrade-serviceability
            dependencies: [precheck-after-upgrade, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: wait_upgrade_serviceability
                - name: module
                  value: milvus_client.requests.wait_data_serviceability
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/baseline/seed_data.json
                    --timeout-sec {{workflow.parameters.rollback-serviceability-timeout-sec}}
                    --interval-sec {{workflow.parameters.rollback-serviceability-interval-sec}}

          - name: validate-after-upgrade
            dependencies: [wait-upgrade-serviceability, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_after_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/baseline/seed_data.json

          - name: strict-pressure-after-upgrade
            dependencies: [validate-after-upgrade, pressure-daemon]
            template: run-pressure-suite
            arguments:
              parameters:
                - name: phase
                  value: after-upgrade
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: schema-matrix
                  value: "{{workflow.parameters.schema-matrix}}"

          - name: schema-evolution-existing
            dependencies: [strict-pressure-after-upgrade, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.schema-evolution-existing-enabled}}"
                - name: brick-name
                  value: schema_evolution_existing
                - name: module
                  value: milvus_client.requests.schema_evolution_workload
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --rows-per-collection {{workflow.parameters.rows-per-collection}}
                    --batch-size {{workflow.parameters.batch-size}}

          - name: patch-post-upgrade-config
            dependencies: [schema-evolution-existing, pressure-daemon]
            template: patch-milvus-config
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.post-upgrade-config-toggle-enabled}}"
                - name: json-shredding-enabled
                  value: "{{workflow.parameters.post-upgrade-json-shredding-enabled}}"
                - name: loon-ffi-enabled
                  value: "{{workflow.parameters.target-loon-ffi-enabled}}"
                - name: vortex-enabled
                  value: "{{workflow.parameters.target-vortex-enabled}}"

          - name: wait-post-upgrade-config-ready
            dependencies: [patch-post-upgrade-config, pressure-daemon]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.target-milvus-image}}"

          - name: snapshot-post-upgrade-config
            dependencies: [wait-post-upgrade-config-ready, pressure-daemon]
            template: snapshot-milvus-config
            arguments:
              parameters:
                - name: phase
                  value: post-upgrade-config

          - name: create-forward-schema
            dependencies: [snapshot-post-upgrade-config, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.forward-workload-enabled}}"
                - name: brick-name
                  value: create_forward_schema
                - name: module
                  value: milvus_client.requests.create_schema_matrix
                - name: collection-prefix
                  value: "{{workflow.parameters.forward-collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}
                    --drop-if-exists true
                    --load-after-create true

          - name: seed-forward-data
            dependencies: [create-forward-schema, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.forward-workload-enabled}}"
                - name: brick-name
                  value: seed_forward_data
                - name: module
                  value: milvus_client.requests.seed_data
                - name: collection-prefix
                  value: "{{workflow.parameters.forward-collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/forward/seed_data.json
                    --rows-per-collection {{workflow.parameters.rows-per-collection}}
                    --batch-size {{workflow.parameters.batch-size}}

          - name: validate-forward-after-upgrade
            dependencies: [seed-forward-data, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.forward-workload-enabled}}"
                - name: brick-name
                  value: validate_forward_after_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: collection-prefix
                  value: "{{workflow.parameters.forward-collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/forward/seed_data.json

          - name: schema-evolution-forward
            dependencies: [validate-forward-after-upgrade, pressure-daemon]
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.schema-evolution-forward-enabled}}"
                - name: brick-name
                  value: schema_evolution_forward
                - name: module
                  value: milvus_client.requests.schema_evolution_workload
                - name: collection-prefix
                  value: "{{workflow.parameters.forward-collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}
                    --rows-per-collection {{workflow.parameters.rows-per-collection}}
                    --batch-size {{workflow.parameters.batch-size}}

          - name: observe-before-rollback
            dependencies: [schema-evolution-forward, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-before-rollback-sec}}"
                - name: phase
                  value: before-rollback

          - name: strict-pressure-before-rollback
            dependencies: [observe-before-rollback, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: run-pressure-suite
            arguments:
              parameters:
                - name: phase
                  value: before-rollback
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: schema-matrix
                  value: "{{workflow.parameters.schema-matrix}}"

          - name: patch-rollback
            dependencies: [strict-pressure-before-rollback, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: patch-milvus-image
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.rollback-milvus-image}}"
                - name: version
                  value: "{{workflow.parameters.rollback-version}}"
                - name: image-update-mode
                  value: rollingDowngrade
                - name: json-shredding-enabled
                  value: "{{workflow.parameters.rollback-json-shredding-enabled}}"
                - name: loon-ffi-enabled
                  value: "{{workflow.parameters.rollback-loon-ffi-enabled}}"
                - name: vortex-enabled
                  value: "{{workflow.parameters.rollback-vortex-enabled}}"

          - name: wait-rollback-ready
            dependencies: [patch-rollback, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.rollback-milvus-image}}"

          - name: snapshot-after-rollback-config
            dependencies: [wait-rollback-ready, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: snapshot-milvus-config
            arguments:
              parameters:
                - name: phase
                  value: after-rollback

          - name: observe-after-rollback
            dependencies: [wait-forward-rollback-serviceability, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-after-rollback-sec}}"
                - name: phase
                  value: after-rollback

          - name: precheck-after-rollback
            dependencies: [snapshot-after-rollback-config, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_after_rollback
                - name: module
                  value: milvus_client.requests.precheck
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: ""

          - name: validate-after-rollback
            dependencies: [observe-after-rollback, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_after_rollback
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/baseline/seed_data.json

          - name: wait-rollback-serviceability
            dependencies: [precheck-after-rollback, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: wait_rollback_serviceability
                - name: module
                  value: milvus_client.requests.wait_data_serviceability
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/baseline/seed_data.json
                    --timeout-sec {{workflow.parameters.rollback-serviceability-timeout-sec}}
                    --interval-sec {{workflow.parameters.rollback-serviceability-interval-sec}}

          - name: validate-forward-after-rollback
            dependencies: [validate-after-rollback, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true && {{workflow.parameters.forward-workload-enabled}} == true"
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.rollback-forward-validation-enabled}}"
                - name: brick-name
                  value: validate_forward_after_rollback
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: collection-prefix
                  value: "{{workflow.parameters.forward-collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/forward/seed_data.json

          - name: wait-forward-rollback-serviceability
            dependencies: [wait-rollback-serviceability, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true && {{workflow.parameters.forward-workload-enabled}} == true"
            template: optional-run-brick
            arguments:
              parameters:
                - name: enabled
                  value: "{{workflow.parameters.rollback-forward-validation-enabled}}"
                - name: brick-name
                  value: wait_forward_rollback_serviceability
                - name: module
                  value: milvus_client.requests.wait_data_serviceability
                - name: collection-prefix
                  value: "{{workflow.parameters.forward-collection-prefix}}"
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.forward-schema-matrix}}
                    --checkpoint-file /tmp/milvus-bricks/checkpoints/forward/seed_data.json
                    --timeout-sec {{workflow.parameters.rollback-serviceability-timeout-sec}}
                    --interval-sec {{workflow.parameters.rollback-serviceability-interval-sec}}

          - name: strict-pressure-after-rollback
            dependencies: [validate-forward-after-rollback, pressure-daemon]
            when: "{{workflow.parameters.rollback-enabled}} == true"
            template: run-pressure-suite
            arguments:
              parameters:
                - name: phase
                  value: after-rollback
                - name: collection-prefix
                  value: "{{workflow.parameters.collection-prefix}}"
                - name: schema-matrix
                  value: "{{workflow.parameters.schema-matrix}}"

          - name: stop-pressure
            dependencies: [strict-pressure-after-rollback, pressure-daemon]
            template: stop-pressure

          - name: check-pressure-results
            dependencies: [stop-pressure]
            template: check-pressure-results

          - name: collect-artifacts
            dependencies: [check-pressure-results]
            template: collect-artifacts

          - name: generate-final-report
            dependencies: [collect-artifacts]
            template: generate-final-report

          - name: gate-final-status
            dependencies: [generate-final-report]
            template: gate-final-status

    - name: resolve-inputs
      outputs:
        artifacts:
          - name: env-snapshot
            path: /tmp/milvus-bricks/reports/env_snapshot.json
          - name: flow-summary
            path: /tmp/milvus-bricks/reports/flow_summary.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        args:
          - |
            set -eu
            python3 - <<'PY'
            import re
            import sys

            prefixes = {
                "collection-prefix": "{{workflow.parameters.collection-prefix}}",
                "forward-collection-prefix": "{{workflow.parameters.forward-collection-prefix}}",
            }
            pattern = re.compile(r"^[A-Za-z_][A-Za-z0-9_]*$")
            invalid = {name: value for name, value in prefixes.items() if not pattern.fullmatch(value)}
            if invalid:
                print(f"invalid Milvus collection prefix parameters: {invalid}", file=sys.stderr)
                raise SystemExit(2)
            schema_matrix = "{{workflow.parameters.schema-matrix}}"
            target_version = "{{workflow.parameters.target-version}}"
            rollback_version = "{{workflow.parameters.rollback-version}}"
            rollback_enabled = "{{workflow.parameters.rollback-enabled}}" == "true"
            allow_unsafe_negative_coverage = "{{workflow.parameters.allow-unsafe-negative-coverage}}" == "true"
            scenario_id = "{{workflow.parameters.scenario-id}}"
            approved_unsafe_negative_scenarios = set()
            if allow_unsafe_negative_coverage and scenario_id not in approved_unsafe_negative_scenarios:
                print(
                    "invalid unsafe negative coverage bypass: allow-unsafe-negative-coverage=true "
                    f"is only allowed for approved negative scenarios; scenario-id={scenario_id!r}",
                    file=sys.stderr,
                )
                raise SystemExit(2)
            unsafe_phase_flags = {
                "base-loon-ffi-enabled(storage_v3)": "{{workflow.parameters.base-loon-ffi-enabled}}" == "true",
                "base-vortex-enabled": "{{workflow.parameters.base-vortex-enabled}}" == "true",
