apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: milvus-upgrade-rollback-compatibility
spec:
  entrypoint: upgrade-rollback-compatibility
  arguments:
    parameters:
      - name: image
        value: python:3.11
      - name: repo-url
        value: https://github.com/yanliang567/vectordb-testbricks.git
      - name: repo-revision
        value: main
      - name: python-deps
        value: pymilvus pyyaml
      - name: uri
        value: http://localhost:19530
      - name: collection-prefix
        value: qa_upgrade
      - name: token-secret-name
        value: milvus-token
      - name: token-secret-key
        value: token
      - name: compat-schema-matrix
        value: milvus_client/manifests/schema_matrix_2_6.yaml
      - name: forward-schema-matrix
        value: milvus_client/manifests/schema_matrix_3_0.yaml
      - name: cycles
        value: "3"
      - name: rows-per-collection
        value: "1000"
      - name: batch-size
        value: "100"
      - name: mixed-rw-slice-duration-sec
        value: "30"
      - name: mixed-rw-max-workers
        value: "8"
      - name: validator-interval-sec
        value: "60"
      - name: upgrade-wait-file
        value: ""
      - name: rollback-wait-file
        value: ""
      - name: observe-after-upgrade-sec
        value: "60"
      - name: observe-after-rollback-sec
        value: "60"
  templates:
    - name: brick-runner
      inputs:
        parameters:
          - name: module
          - name: args
      outputs:
        artifacts:
          - name: result-json
            path: /tmp/brick-result/result.json
          - name: checkpoints
            path: /tmp/milvus-bricks/checkpoints
      container:
        image: "{{workflow.parameters.image}}"
        command: [sh, -c]
        env:
          - name: MILVUS_TOKEN
            valueFrom:
              secretKeyRef:
                name: "{{workflow.parameters.token-secret-name}}"
                key: "{{workflow.parameters.token-secret-key}}"
        args:
          - |
            mkdir -p /tmp/brick-result /tmp/milvus-bricks/checkpoints /tmp/milvus-bricks/results
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            cd /workspace/repo/milvus-bricks
            PYTHONPATH=. python3 -m {{inputs.parameters.module}} \
              --uri "{{workflow.parameters.uri}}" \
              --token "$MILVUS_TOKEN" \
              --collection-prefix "{{workflow.parameters.collection-prefix}}" \
              --checkpoint-dir /tmp/milvus-bricks/checkpoints \
              --output-json /tmp/brick-result/result.json \
              {{inputs.parameters.args}}
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: milvus-bricks-state
            mountPath: /tmp/milvus-bricks
      initContainers:
        - name: checkout
          image: alpine/git:2.45.2
          command: [sh, -c]
          args:
            - |
              git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" \
                "{{workflow.parameters.repo-url}}" /workspace/repo
          volumeMounts:
            - name: workspace
              mountPath: /workspace
    - name: scenario-runner
      outputs:
        artifacts:
          - name: result-json
            path: /tmp/brick-result/result.json
          - name: checkpoints
            path: /tmp/milvus-bricks/checkpoints
          - name: results
            path: /tmp/milvus-bricks/results
      container:
        image: "{{workflow.parameters.image}}"
        command: [sh, -c]
        env:
          - name: MILVUS_TOKEN
            valueFrom:
              secretKeyRef:
                name: "{{workflow.parameters.token-secret-name}}"
                key: "{{workflow.parameters.token-secret-key}}"
        args:
          - |
            mkdir -p /tmp/brick-result /tmp/milvus-bricks/checkpoints /tmp/milvus-bricks/results
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            cat >/tmp/milvus-bricks/scenario.yaml <<'EOF'
            name: upgrade_rollback_compatibility
            cycles: {{workflow.parameters.cycles}}
            fail_on_background_failure: true
            observe_after_upgrade_sec: {{workflow.parameters.observe-after-upgrade-sec}}
            observe_after_rollback_sec: {{workflow.parameters.observe-after-rollback-sec}}
            compat_schema_matrix: {{workflow.parameters.compat-schema-matrix}}
            forward_schema_matrix: {{workflow.parameters.forward-schema-matrix}}
            rows_per_collection: {{workflow.parameters.rows-per-collection}}
            batch_size: {{workflow.parameters.batch-size}}
            actions:
              upgrade:
                type: external
                wait_file: "{{workflow.parameters.upgrade-wait-file}}"
              rollback:
                type: external
                wait_file: "{{workflow.parameters.rollback-wait-file}}"
            workloads:
              mixed_rw:
                max_workers: {{workflow.parameters.mixed-rw-max-workers}}
                slice_duration_sec: {{workflow.parameters.mixed-rw-slice-duration-sec}}
                batch_size: {{workflow.parameters.batch-size}}
              validator:
                interval_sec: {{workflow.parameters.validator-interval-sec}}
            EOF
            cd /workspace/repo/milvus-bricks
            PYTHONPATH=. python3 -m milvus_client.scenarios.upgrade_rollback_compatibility \
              --scenario-manifest /tmp/milvus-bricks/scenario.yaml \
              --uri "{{workflow.parameters.uri}}" \
              --token "$MILVUS_TOKEN" \
              --collection-prefix "{{workflow.parameters.collection-prefix}}" \
              --checkpoint-dir /tmp/milvus-bricks/checkpoints \
              --output-json /tmp/brick-result/result.json
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: milvus-bricks-state
            mountPath: /tmp/milvus-bricks
      initContainers:
        - name: checkout
          image: alpine/git:2.45.2
          command: [sh, -c]
          args:
            - |
              git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" \
                "{{workflow.parameters.repo-url}}" /workspace/repo
          volumeMounts:
            - name: workspace
              mountPath: /workspace
    - name: upgrade-rollback-compatibility
      dag:
        tasks:
          - name: run-closed-loop-scenario
            template: scenario-runner
    - name: wait-file
      inputs:
        parameters:
          - name: wait-file
          - name: action-name
      container:
        image: alpine:3.20
        command: [sh, -c]
        args:
          - |
            if [ -z "{{inputs.parameters.wait-file}}" ]; then
              echo "No {{inputs.parameters.action-name}} wait file configured; continuing."
              exit 0
            fi
            echo "Waiting for {{inputs.parameters.action-name}} signal: {{inputs.parameters.wait-file}}"
            while [ ! -f "{{inputs.parameters.wait-file}}" ]; do
              sleep 10
            done
        volumeMounts:
          - name: milvus-bricks-state
            mountPath: /tmp/milvus-bricks
    - name: observe
      inputs:
        parameters:
          - name: seconds
          - name: phase
      container:
        image: alpine:3.20
        command: [sh, -c]
        args:
          - |
            echo "Observing {{inputs.parameters.phase}} for {{inputs.parameters.seconds}} seconds"
            sleep "{{inputs.parameters.seconds}}"
  volumes:
    - name: workspace
      emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: milvus-bricks-state
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
