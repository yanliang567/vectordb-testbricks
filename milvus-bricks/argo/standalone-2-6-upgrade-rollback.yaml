apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: milvus-standalone-2-6-upgrade-rollback
spec:
  serviceAccountName: qa-admin
  entrypoint: main
  onExit: maybe-cleanup
  arguments:
    parameters:
      - name: repo-url
        value: https://github.com/yanliang567/vectordb-testbricks.git
      - name: repo-revision
        value: feat/milvus-client-bricks-runtime
      - name: python-image
        value: python:3.11-slim
      - name: kubectl-image
        value: harbor-us-vdc.zilliz.cc/devops/bitnami/kubectl:1.28.5
      - name: python-deps
        value: pymilvus==3.0.0 pyyaml numpy
      - name: base-image
        value: harbor.milvus.io/milvusdb/milvus:v2.6.18
      - name: base-version
        value: "2.6.18"
      - name: target-image
        value: harbor.milvus.io/milvusdb/milvus:2.6-20260707-682ac8df
      - name: target-version
        value: "2.6.0"
      - name: collection-prefix
        value: qa_upgrade_2618
      - name: schema-matrix
        value: milvus_client/manifests/schema_matrix_2_6.yaml
      - name: rows-per-collection
        value: "1000"
      - name: batch-size
        value: "100"
      - name: pressure-modules
        value: "search_pressure query_pressure query_iterator_scan upsert_pressure delete_pressure mixed_rw_pressure"
      - name: pressure-slice-duration-sec
        value: "10"
      - name: pressure-max-workers
        value: "4"
      - name: pressure-batch-size
        value: "10"
      - name: pressure-interval-sec
        value: "1"
      - name: pressure-fail-on-error
        value: "false"
      - name: observe-after-upgrade-sec
        value: "60"
      - name: observe-after-rollback-sec
        value: "60"
      - name: cleanup
        value: "false"
  volumeClaimTemplates:
    - metadata:
        name: milvus-test-state
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
  templates:
    - name: main
      dag:
        tasks:
          - name: deploy-base
            template: deploy-milvus

          - name: wait-base-ready
            dependencies: [deploy-base]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.base-image}}"

          - name: precheck-base
            dependencies: [wait-base-ready]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_base
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: create-compat-schema
            dependencies: [precheck-base]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: create_compat_schema
                - name: module
                  value: milvus_client.requests.create_schema_matrix
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --drop-if-exists true
                    --load-after-create true

          - name: seed-compat-data
            dependencies: [create-compat-schema]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: seed_compat_data
                - name: module
                  value: milvus_client.requests.seed_data
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --rows-per-collection {{workflow.parameters.rows-per-collection}}
                    --batch-size {{workflow.parameters.batch-size}}

          - name: validate-before-upgrade
            dependencies: [seed-compat-data]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_before_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

          - name: pressure-daemon
            dependencies: [validate-before-upgrade]
            template: pressure-daemon

          - name: patch-upgrade
            dependencies: [pressure-daemon]
            template: patch-milvus-image
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.target-image}}"
                - name: version
                  value: "{{workflow.parameters.target-version}}"
                - name: image-update-mode
                  value: rollingUpgrade

          - name: wait-upgrade-ready
            dependencies: [patch-upgrade]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.target-image}}"

          - name: observe-after-upgrade
            dependencies: [wait-upgrade-ready]
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-after-upgrade-sec}}"
                - name: phase
                  value: after-upgrade

          - name: precheck-after-upgrade
            dependencies: [observe-after-upgrade]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_after_upgrade
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: validate-after-upgrade
            dependencies: [precheck-after-upgrade]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_after_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

          - name: patch-rollback
            dependencies: [validate-after-upgrade]
            template: patch-milvus-image
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.base-image}}"
                - name: version
                  value: "{{workflow.parameters.base-version}}"
                - name: image-update-mode
                  value: rollingDowngrade

          - name: wait-rollback-ready
            dependencies: [patch-rollback]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.base-image}}"

          - name: observe-after-rollback
            dependencies: [wait-rollback-ready]
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-after-rollback-sec}}"
                - name: phase
                  value: after-rollback

          - name: precheck-after-rollback
            dependencies: [observe-after-rollback]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_after_rollback
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: validate-after-rollback
            dependencies: [precheck-after-rollback]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_after_rollback
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

    - name: deploy-milvus
      container:
        image: "{{workflow.parameters.kubectl-image}}"
        command: [sh, -c]
        args:
          - |
            set -eux
            cat <<EOF | kubectl apply -f -
            apiVersion: milvus.io/v1beta1
            kind: Milvus
            metadata:
              name: {{workflow.name}}
              namespace: {{workflow.namespace}}
              labels:
                app: milvus-standalone-2-6-upgrade-rollback
                workflow: {{workflow.name}}
            spec:
              mode: standalone
              components:
                image: {{workflow.parameters.base-image}}
                version: "{{workflow.parameters.base-version}}"
                imagePullPolicy: IfNotPresent
                imageUpdateMode: all
                standalone:
                  resources:
                    requests:
                      cpu: "4"
                      memory: 16Gi
                    limits:
                      cpu: "4"
                      memory: 16Gi
              dependencies:
                msgStreamType: rocksmq
                etcd:
                  inCluster:
                    deletionPolicy: Delete
                    pvcDeletion: true
                    values:
                      replicaCount: 1
                      persistence:
                        size: 10Gi
                storage:
                  inCluster:
                    deletionPolicy: Delete
                    pvcDeletion: true
                    values:
                      mode: standalone
                      persistence:
                        size: 20Gi
            EOF

    - name: wait-milvus-ready
      inputs:
        parameters:
          - name: expected-image
      container:
        image: "{{workflow.parameters.kubectl-image}}"
        command: [sh, -c]
        args:
          - |
            set -eu
            name="{{workflow.name}}"
            expected="{{inputs.parameters.expected-image}}"
            for i in $(seq 1 120); do
              status=$(kubectl -n {{workflow.namespace}} get mi "$name" -o jsonpath='{.status.status}' 2>/dev/null || true)
              current=$(kubectl -n {{workflow.namespace}} get mi "$name" -o jsonpath='{.status.currentImage}' 2>/dev/null || true)
              endpoint=$(kubectl -n {{workflow.namespace}} get mi "$name" -o jsonpath='{.status.endpoint}' 2>/dev/null || true)
              echo "[$i] status=$status currentImage=$current endpoint=$endpoint expected=$expected"
              if kubectl -n {{workflow.namespace}} get svc "${name}-milvus" >/dev/null 2>&1; then
                svc_ok=true
              else
                svc_ok=false
              fi
              if { [ "$status" = "Healthy" ] || [ "$status" = "Ready" ]; } && [ "$svc_ok" = "true" ]; then
                if [ -z "$expected" ] || [ "$current" = "$expected" ]; then
                  kubectl -n {{workflow.namespace}} get mi "$name" -o wide || true
                  kubectl -n {{workflow.namespace}} get pods -l app.kubernetes.io/instance="$name" -o wide || true
                  exit 0
                fi
              fi
              sleep 10
            done
            kubectl -n {{workflow.namespace}} get mi "$name" -o yaml || true
            kubectl -n {{workflow.namespace}} get pods -l app.kubernetes.io/instance="$name" -o wide || true
            exit 1

    - name: patch-milvus-image
      inputs:
        parameters:
          - name: image
          - name: version
          - name: image-update-mode
      container:
        image: "{{workflow.parameters.kubectl-image}}"
        command: [sh, -c]
        args:
          - |
            set -eux
            kubectl -n {{workflow.namespace}} patch mi {{workflow.name}} --type merge -p "{\"spec\":{\"components\":{\"image\":\"{{inputs.parameters.image}}\",\"version\":\"{{inputs.parameters.version}}\",\"imageUpdateMode\":\"{{inputs.parameters.image-update-mode}}\"}}}"
            kubectl -n {{workflow.namespace}} get mi {{workflow.name}} -o yaml | sed -n '1,180p'

    - name: run-brick
      inputs:
        parameters:
          - name: brick-name
          - name: module
          - name: args
      outputs:
        artifacts:
          - name: result-json
            path: /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json
          - name: checkpoints
            path: /tmp/milvus-bricks/checkpoints
          - name: results
            path: /tmp/milvus-bricks/results
      container:
        image: "{{workflow.parameters.python-image}}"
        command: [sh, -c]
        args:
          - |
            set -eux
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends git ca-certificates >/dev/null
            python -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/milvus-bricks/results /tmp/milvus-bricks/checkpoints
            PYTHONPATH=. python -m {{inputs.parameters.module}} \
              --uri "http://{{workflow.name}}-milvus:19530" \
              --collection-prefix "{{workflow.parameters.collection-prefix}}" \
              --checkpoint-dir /tmp/milvus-bricks/checkpoints \
              --output-json /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json \
              {{inputs.parameters.args}}
            python -m json.tool /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: pressure-daemon
      daemon: true
      container:
        image: "{{workflow.parameters.python-image}}"
        command: [sh, -c]
        args:
          - |
            set -eu
            trap 'echo "stopping pressure daemon"; exit 0' TERM INT
            apt-get update >/dev/null
            apt-get install -y --no-install-recommends git ca-certificates >/dev/null
            python -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/milvus-pressure/results /tmp/milvus-pressure/checkpoints
            iteration=0
            while true; do
              for module in {{workflow.parameters.pressure-modules}}; do
                iteration=$((iteration + 1))
                result="/tmp/milvus-pressure/results/${module}_${iteration}.json"
                set +e
                PYTHONPATH=. python -m "milvus_client.requests.${module}" \
                  --uri "http://{{workflow.name}}-milvus:19530" \
                  --collection-prefix "{{workflow.parameters.collection-prefix}}" \
                  --checkpoint-dir /tmp/milvus-pressure/checkpoints \
                  --output-json "$result" \
                  --schema-matrix "{{workflow.parameters.schema-matrix}}" \
                  --duration-sec "{{workflow.parameters.pressure-slice-duration-sec}}" \
                  --max-workers "{{workflow.parameters.pressure-max-workers}}" \
                  --batch-size "{{workflow.parameters.pressure-batch-size}}"
                rc=$?
                set -e
                echo "pressure module=${module} iteration=${iteration} rc=${rc}"
                if [ "$rc" != "0" ] && [ "{{workflow.parameters.pressure-fail-on-error}}" = "true" ]; then
                  exit "$rc"
                fi
                sleep "{{workflow.parameters.pressure-interval-sec}}"
              done
            done

    - name: observe
      inputs:
        parameters:
          - name: seconds
          - name: phase
      container:
        image: alpine:3.20
        command: [sh, -c]
        args:
          - |
            echo "Observing {{inputs.parameters.phase}} for {{inputs.parameters.seconds}} seconds"
            sleep "{{inputs.parameters.seconds}}"

    - name: maybe-cleanup
      container:
        image: "{{workflow.parameters.kubectl-image}}"
        command: [sh, -c]
        args:
          - |
            set -eux
            if [ "{{workflow.parameters.cleanup}}" = "true" ]; then
              kubectl -n {{workflow.namespace}} delete mi {{workflow.name}} --ignore-not-found=true
            else
              echo "cleanup=false; keeping Milvus {{workflow.name}} for inspection"
            fi
