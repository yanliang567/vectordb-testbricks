apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: milvus-standalone-2-6-upgrade-rollback
  namespace: qa
spec:
  serviceAccountName: milvus-upgrade-rollback-runner
  entrypoint: main
  onExit: maybe-cleanup
  arguments:
    parameters:
      - name: client-namespace
        value: qa
      - name: milvus-namespace
        value: qa-milvus
      - name: repo-url
        value: https://github.com/yanliang567/vectordb-testbricks.git
      - name: repo-revision
        value: main
      - name: client-image
        value: harbor.milvus.io/qa/fouram:2.1
      - name: python-deps
        value: pymilvus==3.0.0 pyyaml numpy
      - name: base-milvus-image
        value: harbor.milvus.io/milvusdb/milvus:v2.6.18
      - name: base-version
        value: "2.6.18"
      - name: target-milvus-image
        value: harbor.milvus.io/milvusdb/milvus:2.6-20260707-682ac8df
      - name: target-version
        value: "2.6.0"
      - name: standalone-cpu
        value: "4"
      - name: standalone-memory
        value: 16Gi
      - name: etcd-pvc-size
        value: 10Gi
      - name: storage-pvc-size
        value: 20Gi
      - name: collection-prefix
        value: qa_upgrade_2618
      - name: schema-matrix
        value: milvus_client/manifests/schema_matrix_2_6.yaml
      - name: rows-per-collection
        value: "1000"
      - name: batch-size
        value: "100"
      - name: pressure-modules
        value: "search_pressure query_pressure query_iterator_scan count_pressure upsert_pressure delete_pressure mixed_rw_pressure"
      - name: pressure-slice-duration-sec
        value: "10"
      - name: pressure-max-workers
        value: "4"
      - name: pressure-batch-size
        value: "10"
      - name: pressure-interval-sec
        value: "1"
      - name: pressure-fail-on-error
        value: "true"
      - name: observe-after-upgrade-sec
        value: "60"
      - name: observe-after-rollback-sec
        value: "60"
      - name: keep-milvus
        value: "false"
  volumeClaimTemplates:
    - metadata:
        name: milvus-test-state
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
  templates:
    - name: main
      dag:
        tasks:
          - name: resolve-inputs
            template: resolve-inputs

          - name: deploy-base
            dependencies: [resolve-inputs]
            template: deploy-milvus

          - name: wait-base-ready
            dependencies: [deploy-base]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.base-milvus-image}}"

          - name: precheck-base
            dependencies: [wait-base-ready]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_base
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: create-compat-schema
            dependencies: [precheck-base]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: create_compat_schema
                - name: module
                  value: milvus_client.requests.create_schema_matrix
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --drop-if-exists true
                    --load-after-create true

          - name: seed-compat-data
            dependencies: [create-compat-schema]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: seed_compat_data
                - name: module
                  value: milvus_client.requests.seed_data
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}
                    --rows-per-collection {{workflow.parameters.rows-per-collection}}
                    --batch-size {{workflow.parameters.batch-size}}

          - name: validate-before-upgrade
            dependencies: [seed-compat-data]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_before_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

          - name: pressure-daemon
            dependencies: [validate-before-upgrade]
            template: pressure-daemon

          - name: patch-upgrade
            dependencies: [pressure-daemon]
            template: patch-milvus-image
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.target-milvus-image}}"
                - name: version
                  value: "{{workflow.parameters.target-version}}"
                - name: image-update-mode
                  value: rollingUpgrade

          - name: wait-upgrade-ready
            dependencies: [patch-upgrade, pressure-daemon]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.target-milvus-image}}"

          - name: observe-after-upgrade
            dependencies: [wait-upgrade-ready, pressure-daemon]
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-after-upgrade-sec}}"
                - name: phase
                  value: after-upgrade

          - name: precheck-after-upgrade
            dependencies: [observe-after-upgrade, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_after_upgrade
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: validate-after-upgrade
            dependencies: [precheck-after-upgrade, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_after_upgrade
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

          - name: patch-rollback
            dependencies: [validate-after-upgrade, pressure-daemon]
            template: patch-milvus-image
            arguments:
              parameters:
                - name: image
                  value: "{{workflow.parameters.base-milvus-image}}"
                - name: version
                  value: "{{workflow.parameters.base-version}}"
                - name: image-update-mode
                  value: rollingDowngrade

          - name: wait-rollback-ready
            dependencies: [patch-rollback, pressure-daemon]
            template: wait-milvus-ready
            arguments:
              parameters:
                - name: expected-image
                  value: "{{workflow.parameters.base-milvus-image}}"

          - name: observe-after-rollback
            dependencies: [wait-rollback-ready, pressure-daemon]
            template: observe
            arguments:
              parameters:
                - name: seconds
                  value: "{{workflow.parameters.observe-after-rollback-sec}}"
                - name: phase
                  value: after-rollback

          - name: precheck-after-rollback
            dependencies: [observe-after-rollback, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: precheck_after_rollback
                - name: module
                  value: milvus_client.requests.precheck
                - name: args
                  value: ""

          - name: validate-after-rollback
            dependencies: [precheck-after-rollback, pressure-daemon]
            template: run-brick
            arguments:
              parameters:
                - name: brick-name
                  value: validate_after_rollback
                - name: module
                  value: milvus_client.requests.validate_data_integrity
                - name: args
                  value: >-
                    --schema-matrix {{workflow.parameters.schema-matrix}}

          - name: stop-pressure
            dependencies: [validate-after-rollback, pressure-daemon]
            template: stop-pressure

          - name: check-pressure-results
            dependencies: [stop-pressure]
            template: check-pressure-results

          - name: collect-artifacts
            dependencies: [check-pressure-results]
            template: collect-artifacts

    - name: resolve-inputs
      outputs:
        artifacts:
          - name: env-snapshot
            path: /tmp/milvus-bricks/reports/env_snapshot.json
          - name: flow-summary
            path: /tmp/milvus-bricks/reports/flow_summary.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            mkdir -p /tmp/milvus-bricks/reports
            cat > /tmp/milvus-bricks/reports/env_snapshot.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "client_namespace": "{{workflow.parameters.client-namespace}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "client_image": "{{workflow.parameters.client-image}}",
              "repo_url": "{{workflow.parameters.repo-url}}",
              "repo_revision": "{{workflow.parameters.repo-revision}}",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "base_version": "{{workflow.parameters.base-version}}",
              "target_version": "{{workflow.parameters.target-version}}",
              "collection_prefix": "{{workflow.parameters.collection-prefix}}",
              "schema_matrix": "{{workflow.parameters.schema-matrix}}",
              "standalone_cpu": "{{workflow.parameters.standalone-cpu}}",
              "standalone_memory": "{{workflow.parameters.standalone-memory}}",
              "etcd_pvc_size": "{{workflow.parameters.etcd-pvc-size}}",
              "storage_pvc_size": "{{workflow.parameters.storage-pvc-size}}",
              "keep_milvus": "{{workflow.parameters.keep-milvus}}"
            }
            EOF
            cat > /tmp/milvus-bricks/reports/flow_summary.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "milvus_release_name": "{{workflow.name}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "milvus_host": "{{workflow.name}}-milvus.{{workflow.parameters.milvus-namespace}}.svc",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "cleanup_attempted": false,
              "cleanup_status": "pending",
              "cleanup_error": "",
              "kept_resources": []
            }
            EOF

    - name: deploy-milvus
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eux
            cat <<EOF | kubectl apply -f -
            apiVersion: milvus.io/v1beta1
            kind: Milvus
            metadata:
              name: {{workflow.name}}
              namespace: {{workflow.parameters.milvus-namespace}}
              labels:
                app.kubernetes.io/managed-by: argo-workflow
                app.kubernetes.io/name: milvus-standalone-2-6-upgrade-rollback
                zilliz.com/workflow-run-id: "{{workflow.uid}}"
              annotations:
                zilliz.com/workflow-name: "{{workflow.name}}"
                zilliz.com/workflow-uid: "{{workflow.uid}}"
            spec:
              mode: standalone
              components:
                image: {{workflow.parameters.base-milvus-image}}
                version: "{{workflow.parameters.base-version}}"
                imagePullPolicy: IfNotPresent
                imageUpdateMode: all
                standalone:
                  resources:
                    requests:
                      cpu: "{{workflow.parameters.standalone-cpu}}"
                      memory: "{{workflow.parameters.standalone-memory}}"
                    limits:
                      cpu: "{{workflow.parameters.standalone-cpu}}"
                      memory: "{{workflow.parameters.standalone-memory}}"
              dependencies:
                msgStreamType: rocksmq
                etcd:
                  inCluster:
                    deletionPolicy: Delete
                    pvcDeletion: true
                    values:
                      replicaCount: 1
                      persistence:
                        size: "{{workflow.parameters.etcd-pvc-size}}"
                storage:
                  inCluster:
                    deletionPolicy: Delete
                    pvcDeletion: true
                    values:
                      mode: standalone
                      persistence:
                        size: "{{workflow.parameters.storage-pvc-size}}"
            EOF

    - name: wait-milvus-ready
      inputs:
        parameters:
          - name: expected-image
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            name="{{workflow.name}}"
            expected="{{inputs.parameters.expected-image}}"
            for i in $(seq 1 120); do
              status=$(kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o jsonpath='{.status.status}' 2>/dev/null || true)
              current=$(kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o jsonpath='{.status.currentImage}' 2>/dev/null || true)
              endpoint=$(kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o jsonpath='{.status.endpoint}' 2>/dev/null || true)
              echo "[$i] status=$status currentImage=$current endpoint=$endpoint expected=$expected"
              if kubectl -n {{workflow.parameters.milvus-namespace}} get svc "${name}-milvus" >/dev/null 2>&1; then
                svc_ok=true
              else
                svc_ok=false
              fi
              if { [ "$status" = "Healthy" ] || [ "$status" = "Ready" ]; } && [ "$svc_ok" = "true" ]; then
                if [ -z "$expected" ] || [ "$current" = "$expected" ]; then
                  kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o wide || true
                  kubectl -n {{workflow.parameters.milvus-namespace}} get pods -l app.kubernetes.io/instance="$name" -o wide || true
                  exit 0
                fi
              fi
              sleep 10
            done
            kubectl -n {{workflow.parameters.milvus-namespace}} get mi "$name" -o yaml || true
            kubectl -n {{workflow.parameters.milvus-namespace}} get pods -l app.kubernetes.io/instance="$name" -o wide || true
            exit 1

    - name: patch-milvus-image
      inputs:
        parameters:
          - name: image
          - name: version
          - name: image-update-mode
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eux
            kubectl -n {{workflow.parameters.milvus-namespace}} patch mi {{workflow.name}} --type merge -p "{\"spec\":{\"components\":{\"image\":\"{{inputs.parameters.image}}\",\"version\":\"{{inputs.parameters.version}}\",\"imageUpdateMode\":\"{{inputs.parameters.image-update-mode}}\"}}}"
            kubectl -n {{workflow.parameters.milvus-namespace}} get mi {{workflow.name}} -o yaml | sed -n '1,180p'

    - name: run-brick
      inputs:
        parameters:
          - name: brick-name
          - name: module
          - name: args
      outputs:
        artifacts:
          - name: result-json
            path: /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json
          - name: checkpoints
            path: /tmp/milvus-bricks/checkpoints
          - name: results
            path: /tmp/milvus-bricks/results
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eux
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/milvus-bricks/results /tmp/milvus-bricks/checkpoints
            PYTHONPATH=. python3 -m {{inputs.parameters.module}} \
              --uri "http://{{workflow.name}}-milvus.{{workflow.parameters.milvus-namespace}}.svc:19530" \
              --collection-prefix "{{workflow.parameters.collection-prefix}}" \
              --checkpoint-dir /tmp/milvus-bricks/checkpoints \
              --output-json /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json \
              {{inputs.parameters.args}}
            python3 -m json.tool /tmp/milvus-bricks/results/{{inputs.parameters.brick-name}}.json
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: pressure-daemon
      daemon: true
      outputs:
        artifacts:
          - name: pressure-results
            path: /tmp/milvus-bricks/pressure-results
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        readinessProbe:
          exec:
            command: [sh, -c, "test -f /tmp/pressure-ready"]
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            trap 'echo "stopping pressure daemon"; exit 0' TERM INT
            python3 -m pip install --disable-pip-version-check -q {{workflow.parameters.python-deps}}
            rm -rf /tmp/repo
            git clone --depth 1 --branch "{{workflow.parameters.repo-revision}}" "{{workflow.parameters.repo-url}}" /tmp/repo
            cd /tmp/repo/milvus-bricks
            mkdir -p /tmp/milvus-bricks/pressure-results /tmp/milvus-bricks/pressure-checkpoints
            iteration=0
            while [ ! -f /tmp/milvus-bricks/pressure-stop ]; do
              for module in {{workflow.parameters.pressure-modules}}; do
                if [ -f /tmp/milvus-bricks/pressure-stop ]; then
                  break
                fi
                iteration=$((iteration + 1))
                result="/tmp/milvus-bricks/pressure-results/${module}_${iteration}.json"
                set +e
                PYTHONPATH=. python3 -m "milvus_client.requests.${module}" \
                  --uri "http://{{workflow.name}}-milvus.{{workflow.parameters.milvus-namespace}}.svc:19530" \
                  --collection-prefix "{{workflow.parameters.collection-prefix}}" \
                  --checkpoint-dir /tmp/milvus-bricks/pressure-checkpoints \
                  --output-json "$result" \
                  --schema-matrix "{{workflow.parameters.schema-matrix}}" \
                  --duration-sec "{{workflow.parameters.pressure-slice-duration-sec}}" \
                  --max-workers "{{workflow.parameters.pressure-max-workers}}" \
                  --batch-size "{{workflow.parameters.pressure-batch-size}}" \
                  --baseline-start-id "0" \
                  --baseline-rows-per-collection "{{workflow.parameters.rows-per-collection}}"
                rc=$?
                set -e
                echo "pressure module=${module} iteration=${iteration} rc=${rc}"
                python3 -m json.tool "$result" || cat "$result" || true
                if [ "$rc" = "0" ] && [ ! -f /tmp/pressure-ready ]; then
                  touch /tmp/pressure-ready
                fi
                if [ "$rc" != "0" ]; then
                  touch /tmp/milvus-bricks/pressure-failed
                fi
                sleep "{{workflow.parameters.pressure-interval-sec}}"
              done
            done
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: stop-pressure
      container:
        image: alpine:3.20
        command: [sh, -c]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        args:
          - |
            set -eu
            touch /tmp/milvus-bricks/pressure-stop
            sleep $(({{workflow.parameters.pressure-slice-duration-sec}} + 5))
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: check-pressure-results
      outputs:
        artifacts:
          - name: pressure-summary
            path: /tmp/milvus-bricks/pressure-summary.json
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            python3 - <<'PY'
            import json
            from pathlib import Path

            result_dir = Path("/tmp/milvus-bricks/pressure-results")
            files = sorted(result_dir.glob("*.json"))
            failed = []
            passed = 0
            for path in files:
                try:
                    payload = json.loads(path.read_text())
                except Exception as exc:
                    failed.append({"file": path.name, "status": "unreadable", "error": str(exc)})
                    continue
                if payload.get("status") == "passed":
                    passed += 1
                else:
                    failed.append(
                        {
                            "file": path.name,
                            "brick": payload.get("brick"),
                            "status": payload.get("status"),
                            "failures": payload.get("failures", []),
                            "metrics": payload.get("metrics", {}),
                        }
                    )
            summary = {
                "total": len(files),
                "passed": passed,
                "failed": len(failed),
                "failed_results": failed,
                "fail_on_error": "{{workflow.parameters.pressure-fail-on-error}}" == "true",
            }
            Path("/tmp/milvus-bricks/pressure-summary.json").write_text(json.dumps(summary, indent=2, sort_keys=True))
            print(json.dumps(summary, indent=2, sort_keys=True))
            if not files:
                raise SystemExit(1)
            if summary["fail_on_error"] and failed:
                raise SystemExit(1)
            PY
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: collect-artifacts
      outputs:
        artifacts:
          - name: results
            path: /tmp/milvus-bricks/results
          - name: checkpoints
            path: /tmp/milvus-bricks/checkpoints
          - name: pressure-results
            path: /tmp/milvus-bricks/pressure-results
          - name: pressure-summary
            path: /tmp/milvus-bricks/pressure-summary.json
          - name: k8s-snapshot
            path: /tmp/milvus-bricks/k8s
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            mkdir -p /tmp/milvus-bricks/k8s
            ns="{{workflow.parameters.milvus-namespace}}"
            kubectl -n "$ns" get mi "{{workflow.name}}" -o yaml > /tmp/milvus-bricks/k8s/milvus.yaml 2>&1 || true
            kubectl -n "$ns" get pods -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/pods.txt 2>&1 || true
            kubectl -n "$ns" get services -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/services.txt 2>&1 || true
            kubectl -n "$ns" get persistentvolumeclaims -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/pvcs.txt 2>&1 || true
            kubectl -n "$ns" get deployments,statefulsets,replicasets -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/workloads.txt 2>&1 || true
            kubectl -n "$ns" get events --sort-by=.lastTimestamp > /tmp/milvus-bricks/k8s/events.txt 2>&1 || true
        volumeMounts:
          - name: milvus-test-state
            mountPath: /tmp/milvus-bricks

    - name: observe
      inputs:
        parameters:
          - name: seconds
          - name: phase
      container:
        image: alpine:3.20
        command: [sh, -c]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        args:
          - |
            echo "Observing {{inputs.parameters.phase}} for {{inputs.parameters.seconds}} seconds"
            sleep "{{inputs.parameters.seconds}}"

    - name: maybe-cleanup
      outputs:
        artifacts:
          - name: orchestrator-report
            path: /tmp/milvus-bricks/reports/orchestrator_report.json
          - name: flow-summary
            path: /tmp/milvus-bricks/reports/flow_summary.json
          - name: env-snapshot
            path: /tmp/milvus-bricks/reports/env_snapshot.json
          - name: k8s-snapshot
            path: /tmp/milvus-bricks/k8s
      container:
        image: "{{workflow.parameters.client-image}}"
        command: [sh, -c]
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            cpu: "4"
            memory: 16Gi
        args:
          - |
            set -eu
            mkdir -p /tmp/milvus-bricks/reports /tmp/milvus-bricks/k8s
            ns="{{workflow.parameters.milvus-namespace}}"
            selector="zilliz.com/workflow-run-id={{workflow.uid}}"
            kubectl -n "$ns" get milvuses -l "$selector" -o wide > /tmp/milvus-bricks/k8s/owned_milvuses.txt 2>&1 || true
            kubectl -n "$ns" get pods,services,persistentvolumeclaims,deployments,statefulsets,replicasets -l app.kubernetes.io/instance="{{workflow.name}}" -o wide > /tmp/milvus-bricks/k8s/instance_resources.txt 2>&1 || true
            kubectl -n "$ns" get events --sort-by=.lastTimestamp > /tmp/milvus-bricks/k8s/events.txt 2>&1 || true
            cleanup_attempted=false
            cleanup_status="skipped"
            cleanup_error=""
            kept_resources="[]"
            if [ "{{workflow.parameters.keep-milvus}}" = "false" ]; then
              cleanup_attempted=true
              if {
                kubectl -n "$ns" delete milvuses -l "$selector" --ignore-not-found=true
                kubectl -n "$ns" delete services,persistentvolumeclaims,deployments,statefulsets,configmaps,secrets -l app.kubernetes.io/instance="{{workflow.name}}" --ignore-not-found=true
              } > /tmp/milvus-bricks/k8s/cleanup.txt 2>&1; then
                cleanup_status="completed"
              else
                cleanup_status="failed"
                cleanup_error="$(tr '\n' ' ' < /tmp/milvus-bricks/k8s/cleanup.txt | sed 's/"/\\"/g')"
              fi
            else
              kept_resources="[\"{{workflow.name}}\"]"
            fi
            cat > /tmp/milvus-bricks/reports/env_snapshot.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "client_namespace": "{{workflow.parameters.client-namespace}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "client_image": "{{workflow.parameters.client-image}}",
              "repo_url": "{{workflow.parameters.repo-url}}",
              "repo_revision": "{{workflow.parameters.repo-revision}}",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}"
            }
            EOF
            cat > /tmp/milvus-bricks/reports/flow_summary.json <<EOF
            {
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "milvus_release_name": "{{workflow.name}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "milvus_host": "{{workflow.name}}-milvus.{{workflow.parameters.milvus-namespace}}.svc",
              "base_milvus_image": "{{workflow.parameters.base-milvus-image}}",
              "target_milvus_image": "{{workflow.parameters.target-milvus-image}}",
              "cleanup_attempted": $cleanup_attempted,
              "cleanup_status": "$cleanup_status",
              "cleanup_error": "$cleanup_error",
              "kept_resources": $kept_resources
            }
            EOF
            cat > /tmp/milvus-bricks/reports/orchestrator_report.json <<EOF
            {
              "status": "{{workflow.status}}",
              "workflow_name": "{{workflow.name}}",
              "workflow_uid": "{{workflow.uid}}",
              "milvus_namespace": "{{workflow.parameters.milvus-namespace}}",
              "schema_matrix": "{{workflow.parameters.schema-matrix}}",
              "collection_prefix": "{{workflow.parameters.collection-prefix}}"
            }
            EOF
