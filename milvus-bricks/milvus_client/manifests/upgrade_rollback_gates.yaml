version: "1"

defaults:
  repo_url: https://github.com/yanliang567/vectordb-testbricks.git
  repo_revision: main
  rows_per_collection: 5000
  batch_size: 100
  pressure_modules:
    - search_pressure
    - query_pressure
    - query_iterator_scan
    - count_pressure
    - upsert_pressure
    - delete_pressure
    - mixed_rw_pressure
  rollback_serviceability_timeout_sec: 900
  rollback_serviceability_interval_sec: 10

workflow_templates:
  standalone_2_6: milvus-standalone-2-6-upgrade-rollback
  standalone_3_0: milvus-standalone-3-0-upgrade-rollback
  cluster: milvus-cluster-upgrade-rollback

deploy_profiles:
  standalone: milvus_client/manifests/deploy_profiles/standalone-rocksmq.yaml
  cluster_woodpecker_1cu: milvus_client/manifests/deploy_profiles/cluster-woodpecker-1cu.yaml
  cluster_woodpecker_2cu: milvus_client/manifests/deploy_profiles/cluster-woodpecker-2cu.yaml

schema_matrices:
  "2.6": milvus_client/manifests/schema_matrix_2_6.yaml
  "3.0": milvus_client/manifests/schema_matrix_3_0.yaml

image_aliases:
  milvus-2-6-18:
    image: harbor.milvus.io/milvusdb/milvus:v2.6.18
    version: "2.6.18"
  milvus-2-6-latest:
    image: harbor.milvus.io/milvusdb/milvus:2.6-latest-placeholder
    version: "2.6.0"
  milvus-3-0-baseline:
    image: harbor.milvus.io/milvusdb/milvus:3.0-baseline-placeholder
    version: "3.0.0"
  milvus-3-0-latest:
    image: harbor.milvus.io/milvusdb/milvus:3.0-latest-placeholder
    version: "3.0.0"

scenarios:
  - id: standalone-2-6-18-to-3-0-latest-rollback-2-6-18
    description: "Diagnostic coverage for the pre-#50792 2.6.18 rollback boundary; expected to hit #50694 session version guard with recent 3.0 images."
    mode: standalone
    classification: diagnostic
    support_status: unsupported_known_issue
    workflow_template_ref: standalone_2_6
    deploy_profile_ref: standalone
    schema_matrix_ref: "2.6"
    collection_prefix: qa_gate_2618_to_30_rb_2618
    forward_workload_enabled: false
    schema_evolution_existing_enabled: false
    schema_evolution_forward_enabled: false
    rollback_forward_validation_enabled: false
    base:
      image_ref: milvus-2-6-18
      json_shredding_enabled: false
      vortex_enabled: false
    target:
      image_ref: milvus-3-0-latest
      json_shredding_enabled: false
      loon_ffi_enabled: false
      vortex_enabled: false
    rollback:
      image_ref: milvus-2-6-18
      json_shredding_enabled: false
      vortex_enabled: false
    validation_policy:
      data_integrity: strict
      serviceability: strict
      pressure_fail_on_error: true
      gate_allow_warning: false
    forbidden_after_upgrade:
      - storage_v3
      - vortex

  - id: standalone-2-6-18-to-3-0-latest-rollback-2-6-latest
    description: "Officially supported 2.6.18 baseline to 3.0 latest then rollback to latest 2.6; storage v3/vortex must stay disabled."
    mode: standalone
    classification: gate
    support_status: supported_with_config_constraints
    workflow_template_ref: standalone_2_6
    deploy_profile_ref: standalone
    schema_matrix_ref: "2.6"
    collection_prefix: qa_gate_2618_to_30_rb_26latest
    forward_workload_enabled: false
    schema_evolution_existing_enabled: false
    schema_evolution_forward_enabled: false
    rollback_forward_validation_enabled: false
    base:
      image_ref: milvus-2-6-18
      json_shredding_enabled: false
      vortex_enabled: false
    target:
      image_ref: milvus-3-0-latest
      json_shredding_enabled: false
      loon_ffi_enabled: false
      vortex_enabled: false
    rollback:
      image_ref: milvus-2-6-latest
      json_shredding_enabled: false
      vortex_enabled: false
    validation_policy:
      data_integrity: strict
      serviceability: strict
      pressure_fail_on_error: true
      gate_allow_warning: false
    forbidden_after_upgrade:
      - storage_v3
      - vortex

  - id: standalone-3-0-baseline-to-3-0-latest-rollback-3-0-baseline
    description: "3.0 branch gate: baseline to latest 3.0 and rollback to the same 3.0 baseline."
    mode: standalone
    classification: gate
    support_status: supported
    workflow_template_ref: standalone_3_0
    deploy_profile_ref: standalone
    schema_matrix_ref: "3.0"
    collection_prefix: qa_gate_30_to_30latest
    forward_workload_enabled: false
    schema_evolution_existing_enabled: true
    schema_evolution_forward_enabled: false
    rollback_forward_validation_enabled: true
    base:
      image_ref: milvus-3-0-baseline
      json_shredding_enabled: false
      vortex_enabled: false
    target:
      image_ref: milvus-3-0-latest
      json_shredding_enabled: false
      loon_ffi_enabled: false
      vortex_enabled: false
    rollback:
      image_ref: milvus-3-0-baseline
      json_shredding_enabled: false
      vortex_enabled: false
    validation_policy:
      data_integrity: strict
      serviceability: strict
      pressure_fail_on_error: true
      gate_allow_warning: false

  - id: cluster-2-6-18-to-3-0-latest-rollback-2-6-18
    description: "Cluster-mode diagnostic coverage for the pre-#50792 2.6.18 rollback boundary; expected to hit #50694 session version guard with recent 3.0 images."
    mode: cluster
    classification: diagnostic
    support_status: unsupported_known_issue
    workflow_template_ref: cluster
    deploy_profile_ref: cluster_woodpecker_1cu
    schema_matrix_ref: "2.6"
    collection_prefix: qa_gate_cluster_2618_to_30_rb_2618
    forward_workload_enabled: false
    schema_evolution_existing_enabled: false
    schema_evolution_forward_enabled: false
    rollback_forward_validation_enabled: false
    base:
      image_ref: milvus-2-6-18
      json_shredding_enabled: false
      vortex_enabled: false
    target:
      image_ref: milvus-3-0-latest
      json_shredding_enabled: false
      loon_ffi_enabled: false
      vortex_enabled: false
    rollback:
      image_ref: milvus-2-6-18
      json_shredding_enabled: false
      vortex_enabled: false
    validation_policy:
      data_integrity: strict
      serviceability: strict
      pressure_fail_on_error: true
      gate_allow_warning: false
    forbidden_after_upgrade:
      - storage_v3
      - vortex

  - id: cluster-2-6-18-to-3-0-latest-rollback-2-6-latest
    description: "Cluster-mode coverage for the supported 2.6.18 to 3.0 latest then rollback to latest 2.6 path; storage v3/vortex must stay disabled."
    mode: cluster
    classification: gate
    support_status: supported_with_config_constraints
    workflow_template_ref: cluster
    deploy_profile_ref: cluster_woodpecker_1cu
    schema_matrix_ref: "2.6"
    collection_prefix: qa_gate_cluster_2618_to_30_rb_26latest
    forward_workload_enabled: false
    schema_evolution_existing_enabled: false
    schema_evolution_forward_enabled: false
    rollback_forward_validation_enabled: false
    base:
      image_ref: milvus-2-6-18
      json_shredding_enabled: false
      vortex_enabled: false
    target:
      image_ref: milvus-3-0-latest
      json_shredding_enabled: false
      loon_ffi_enabled: false
      vortex_enabled: false
    rollback:
      image_ref: milvus-2-6-latest
      json_shredding_enabled: false
      vortex_enabled: false
    validation_policy:
      data_integrity: strict
      serviceability: strict
      pressure_fail_on_error: true
      gate_allow_warning: false
    forbidden_after_upgrade:
      - storage_v3
      - vortex

  - id: cluster-3-0-baseline-to-3-0-latest-rollback-3-0-baseline
    description: "Cluster-mode 3.0 branch gate: baseline to latest 3.0 and rollback to the same 3.0 baseline."
    mode: cluster
    classification: gate
    support_status: supported
    workflow_template_ref: cluster
    deploy_profile_ref: cluster_woodpecker_1cu
    schema_matrix_ref: "3.0"
    collection_prefix: qa_gate_cluster_30_to_30latest
    forward_workload_enabled: false
    schema_evolution_existing_enabled: true
    schema_evolution_forward_enabled: false
    rollback_forward_validation_enabled: true
    base:
      image_ref: milvus-3-0-baseline
      json_shredding_enabled: false
      vortex_enabled: false
    target:
      image_ref: milvus-3-0-latest
      json_shredding_enabled: false
      loon_ffi_enabled: false
      vortex_enabled: false
    rollback:
      image_ref: milvus-3-0-baseline
      json_shredding_enabled: false
      vortex_enabled: false
    validation_policy:
      data_integrity: strict
      serviceability: strict
      pressure_fail_on_error: true
      gate_allow_warning: false

  - id: standalone-3-0-loon-vortex-to-2-6-negative
    description: "Negative coverage: rollback to 2.6 after enabling LoonFFI/vortex remains unsafe and must not be promoted to gate."
    mode: standalone
    classification: negative
    support_status: unsupported
    allow_unsafe_negative_coverage: true
    workflow_template_ref: standalone_2_6
    deploy_profile_ref: standalone
    schema_matrix_ref: "2.6"
    collection_prefix: qa_negative_vortex_to_26
    forward_workload_enabled: true
    forward_schema_matrix_ref: "3.0"
    base:
      image_ref: milvus-2-6-18
      json_shredding_enabled: false
      vortex_enabled: false
    target:
      image_ref: milvus-3-0-latest
      json_shredding_enabled: true
      loon_ffi_enabled: true
      vortex_enabled: true
    rollback:
      image_ref: milvus-2-6-latest
      json_shredding_enabled: false
      vortex_enabled: false
    validation_policy:
      data_integrity: observe
      serviceability: observe
      pressure_fail_on_error: false
      gate_allow_warning: true
