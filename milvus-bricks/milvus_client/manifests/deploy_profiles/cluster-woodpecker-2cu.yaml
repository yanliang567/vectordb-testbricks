name: cluster-woodpecker-2cu
mode: cluster
deployer: helm
description: "2CU Milvus cluster with Woodpecker and in-cluster dependencies for heavier QA upgrade/rollback gates."
helm:
  repo_name: zilliztech
  repo_url: https://zilliztech.github.io/milvus-helm/
  chart: zilliztech/milvus
  chart_version: 5.0.24
helm_values:
  cluster:
    enabled: true
  woodpecker:
    enabled: true
    image:
      repository: harbor.milvus.io/milvusdb/woodpecker
      tag: master-e80f1ea-91-amd64
      pullPolicy: Always
    nodeSelector:
      kubernetes.io/arch: amd64
  streaming:
    enabled: true
    woodpecker:
      embedded: false
  indexNode:
    enabled: false
  kafka:
    enabled: false
  pulsar:
    enabled: false
  pulsarv3:
    enabled: false
  service:
    type: ClusterIP
  metrics:
    serviceMonitor:
      enabled: false
components:
  mixCoord:
    replicas: 1
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "1"
        memory: 2Gi
  proxy:
    replicas: 1
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 4Gi
  queryNode:
    replicas: 2
    resources:
      requests:
        cpu: "4"
        memory: 16Gi
      limits:
        cpu: "4"
        memory: 16Gi
  dataNode:
    replicas: 2
    resources:
      requests:
        cpu: "4"
        memory: 16Gi
      limits:
        cpu: "4"
        memory: 16Gi
  streamingNode:
    replicas: 2
    resources:
      requests:
        cpu: "4"
        memory: 16Gi
      limits:
        cpu: "4"
        memory: 16Gi
dependencies:
  msgStreamType: woodpecker
  etcd:
    inCluster:
      deletionPolicy: Delete
      pvcDeletion: true
      values:
        replicaCount: 1
        metrics:
          enabled: false
        persistence:
          size: 20Gi
        persistentVolumeClaimRetentionPolicy:
          enabled: true
          whenDeleted: Delete
          whenScaled: Delete
  storage:
    inCluster:
      deletionPolicy: Delete
      pvcDeletion: true
      values:
        mode: standalone
        persistence:
          size: 100Gi
