features:
  - id: compat_basic_vector
    domain: basic
    priority: P0
    compat_mode: rollback_safe
    required_capabilities: []
    bricks:
      - create_schema_matrix
      - seed_data
      - mixed_rw_pressure
      - validate_data_integrity

  - id: compat_multi_vector
    domain: basic
    priority: P0
    compat_mode: rollback_safe
    required_capabilities: []
    bricks:
      - create_schema_matrix
      - seed_data
      - search_pressure

  - id: compat_json_array
    domain: schema
    priority: P0
    compat_mode: rollback_safe
    required_capabilities: []
    bricks:
      - create_schema_matrix
      - seed_data
      - validate_data_integrity

  - id: query_aggregation
    domain: query_search
    priority: P1
    compat_mode: rollback_safe
    required_capabilities: ["QueryAggregation"]
    bricks:
      - query_aggregation_matrix

  - id: order_by
    domain: query_search
    priority: P1
    compat_mode: rollback_safe
    required_capabilities: ["OrderBy"]
    bricks:
      - query_order_by_matrix
      - search_order_by_matrix

  - id: nullable_vector
    domain: schema
    priority: P1
    compat_mode: forward_only
    required_capabilities: ["NullableVector"]
    bricks:
      - nullable_vector_matrix

  - id: geometry
    domain: schema
    priority: P1
    compat_mode: forward_only
    required_capabilities: ["Geometry"]
    bricks:
      - geometry_matrix

  - id: timestamptz
    domain: schema
    priority: P1
    compat_mode: forward_only
    required_capabilities: ["TimeSeries"]
    bricks:
      - timestamptz_matrix

  - id: entity_ttl
    domain: dml
    priority: P1
    compat_mode: forward_only
    required_capabilities: ["EntityTTL"]
    bricks:
      - entity_ttl_validation

  - id: struct_array_element_hybrid_search
    domain: struct_array
    priority: P1
    compat_mode: forward_only
    required_capabilities: ["StructArray", "ElementHybridSearch"]
    bricks:
      - struct_array_hybrid_search

  - id: storage_v3
    domain: storage
    priority: P2
    compat_mode: forward_only
    required_capabilities: ["StorageV3"]
    bricks:
      - storage_v3_probe

